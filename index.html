    cursor: pointer;
    background: none;
    border: none;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .bau-drawer-itab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--accent-soft); }

  .bau-drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  /* =====================================================
     AGENDA — Google Calendar Style
     ===================================================== */
  .ag-page { display: flex; flex-direction: column; height: calc(100vh - 160px); min-height: 500px; }
  .ag-toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .ag-toolbar-title {
    font-size: 1.25rem; font-weight: 700; color: var(--text); flex: 1; min-width: 160px;
  }
  .ag-view-btns { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .ag-view-btn {
    padding: 7px 14px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
    background: var(--bg-2); color: var(--text-dim); border: none;
    transition: background 0.15s, color 0.15s; touch-action: manipulation;
  }
  .ag-view-btn.active { background: var(--accent); color: #fff; }
  .ag-nav-btn {
    width: 32px; height: 32px; border-radius: 8px; background: var(--bg-2);
    border: 1px solid var(--border); color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 1rem;
    transition: background 0.15s; touch-action: manipulation;
  }
  .ag-nav-btn:hover { background: var(--panel-2); }
  .ag-today-btn {
    padding: 7px 14px; border-radius: 8px; background: var(--bg-2);
    border: 1px solid var(--border); color: var(--text-dim); font-size: 0.8rem;
    font-weight: 600; cursor: pointer; transition: background 0.15s; touch-action: manipulation;
  }
  .ag-today-btn:hover { background: var(--panel-2); }
  .ag-add-btn {
    padding: 7px 16px; border-radius: 8px; background: var(--accent);
    border: none; color: #fff; font-size: 0.82rem; font-weight: 700;
    cursor: pointer; transition: background 0.15s; touch-action: manipulation;
  }
  .ag-add-btn:hover { background: var(--accent-2); }

  /* Month view */
  .ag-month { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .ag-month-dow-row {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .ag-month-dow {
    padding: 8px 0; text-align: center; font-size: 0.72rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim);
  }
  .ag-month-body {
    flex: 1; display: grid; grid-template-rows: repeat(6, 1fr); overflow: hidden;
  }
  .ag-month-row { display: grid; grid-template-columns: repeat(7, 1fr); }
  .ag-month-cell {
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    padding: 4px; min-height: 80px; cursor: pointer; transition: background 0.1s;
    overflow: hidden; display: flex; flex-direction: column; gap: 2px;
  }
  .ag-month-cell:nth-child(7n) { border-right: none; }
  .ag-month-cell:hover { background: var(--panel); }
  .ag-month-cell.other-month .ag-day-num { color: var(--text-faint); }
  .ag-day-num {
    font-size: 0.8rem; font-weight: 600; color: var(--text-dim);
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; flex-shrink: 0; align-self: flex-start;
  }
  .ag-month-cell.today .ag-day-num {
    background: var(--accent); color: #fff;
  }
  .ag-chip {
    font-size: 0.7rem; font-weight: 600; padding: 1px 5px; border-radius: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
    line-height: 1.5;
  }
  .ag-chip:hover { filter: brightness(1.15); }
  .ag-more-chip {
    font-size: 0.68rem; color: var(--text-dim); padding: 1px 4px; cursor: pointer;
    font-weight: 600;
  }

  /* Week view */
  .ag-week { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .ag-week-head {
    display: grid; grid-template-columns: 52px repeat(7, 1fr);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .ag-week-head-day {
    text-align: center; padding: 8px 4px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .ag-week-head-dow {
    font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-dim);
  }
  .ag-week-head-num {
    width: 30px; height: 30px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 0.95rem; font-weight: 700;
    color: var(--text-dim); cursor: pointer;
  }
  .ag-week-head-num.today { background: var(--accent); color: #fff; }
  .ag-week-scroll { flex: 1; overflow-y: auto; }
  .ag-week-body {
    display: grid; grid-template-columns: 52px repeat(7, 1fr);
    position: relative;
  }
  .ag-time-col { }
  .ag-time-label {
    height: 48px; display: flex; align-items: flex-start; justify-content: flex-end;
    padding-right: 8px; padding-top: 2px;
    font-size: 0.65rem; color: var(--text-faint); font-weight: 500;
  }
  .ag-week-day-col {
    border-left: 1px solid var(--border); position: relative;
  }
  .ag-hour-cell {
    height: 48px; border-bottom: 1px solid rgba(var(--border-rgb, 255,255,255), 0.06);
    position: relative;
  }
  .ag-now-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: var(--accent); z-index: 5; pointer-events: none;
  }
  .ag-now-dot {
    position: absolute; left: -4px; top: -4px;
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  }
  .ag-timed-event {
    position: absolute; left: 2px; right: 2px; border-radius: 4px;
    padding: 2px 5px; font-size: 0.68rem; font-weight: 600;
    overflow: hidden; cursor: pointer; z-index: 3;
    line-height: 1.3; border-left: 3px solid rgba(0,0,0,0.25);
  }
  .ag-timed-event:hover { filter: brightness(1.12); z-index: 4; }

  /* Day view */
  .ag-day { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .ag-day-head {
    display: flex; align-items: center; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .ag-day-title {
    font-size: 1.1rem; font-weight: 700; color: var(--text);
  }
  .ag-day-subtitle { font-size: 0.8rem; color: var(--text-dim); }
  .ag-day-scroll { flex: 1; overflow-y: auto; }
  .ag-day-body {
    display: grid; grid-template-columns: 52px 1fr; position: relative;
  }

  /* Event colors */
  .ag-color-tomato    { background: #d32f2f; color: #fff; }
  .ag-color-flamingo  { background: #e91e63; color: #fff; }
  .ag-color-tangerine { background: #f57c00; color: #fff; }
  .ag-color-banana    { background: #f9a825; color: #000; }
  .ag-color-sage      { background: #558b2f; color: #fff; }
  .ag-color-basil     { background: #1b5e20; color: #fff; }
  .ag-color-peacock   { background: #0277bd; color: #fff; }
  .ag-color-blueberry { background: #283593; color: #fff; }
  .ag-color-lavender  { background: #7b1fa2; color: #fff; }
  .ag-color-grape     { background: #6a1b9a; color: #fff; }
  .ag-color-graphite  { background: #37474f; color: #fff; }

  /* All-day strip in week/day */
  .ag-allday-row {
    display: grid; grid-template-columns: 52px repeat(7, 1fr);
    border-bottom: 1px solid var(--border); min-height: 28px;
    flex-shrink: 0;
  }
  .ag-allday-label {
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 8px; font-size: 0.62rem; color: var(--text-faint); font-weight: 500;
  }
  .ag-allday-col {
    border-left: 1px solid var(--border); padding: 2px;
    display: flex; flex-direction: column; gap: 2px;
  }

  @media (max-width: 560px) {
    .ag-month-cell { min-height: 56px; padding: 2px; }
    .ag-day-num   { width: 22px; height: 22px; font-size: 0.72rem; }
    .ag-chip      { font-size: 0.62rem; }
    .ag-time-label, .ag-allday-label { font-size: 0.58rem; padding-right: 4px; }
    .ag-week-head { grid-template-columns: 36px repeat(7, 1fr); }
    .ag-week-body, .ag-allday-row, .ag-day-body { grid-template-columns: 36px 1fr; }
    .ag-view-btn  { padding: 6px 8px; font-size: 0.72rem; }
  }

  /* =====================================================
     HEATMAP (Hábitos — visão anual tipo GitHub)
     ===================================================== */
  .heatmap-wrap {
    margin-top: 20px; padding: 16px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 14px;
  }
  .heatmap-title {
    font-size: 0.8rem; font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .heatmap-grid {
    display: flex; gap: 3px; overflow-x: auto; padding-bottom: 4px;
  }
  .heatmap-col { display: flex; flex-direction: column; gap: 3px; }
  .heatmap-cell {
    width: 11px; height: 11px; border-radius: 2px;
    background: var(--panel-2); flex-shrink: 0; cursor: default;
    transition: transform 0.1s;
  }
  .heatmap-cell:hover { transform: scale(1.4); }
  .heatmap-cell.lv1 { background: color-mix(in srgb, var(--accent) 25%, var(--panel-2)); }
  .heatmap-cell.lv2 { background: color-mix(in srgb, var(--accent) 50%, var(--panel-2)); }
  .heatmap-cell.lv3 { background: color-mix(in srgb, var(--accent) 75%, var(--panel-2)); }
  .heatmap-cell.lv4 { background: var(--accent); }
  .heatmap-legend {
    display: flex; align-items: center; gap: 4px; margin-top: 6px;
    font-size: 0.68rem; color: var(--text-faint); justify-content: flex-end;
  }
  .heatmap-legend-cell { width: 10px; height: 10px; border-radius: 2px; }
  .heatmap-month-labels {
    display: flex; gap: 3px; margin-bottom: 3px; overflow-x: auto;
  }
  .heatmap-month-label {
    font-size: 0.65rem; color: var(--text-faint); flex-shrink: 0;
  }

  /* =====================================================
     SUBTAREFAS
     ===================================================== */
  .subtask-list { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; padding-left: 36px; }
  .subtask-item {
    display: flex; align-items: center; gap: 8px; font-size: 0.82rem;
    color: var(--text-dim);
  }
  .subtask-item.done-sub { text-decoration: line-through; opacity: 0.55; }
  .subtask-cb {
    width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--border-strong);
    flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; background: var(--bg);
  }
  .subtask-cb.checked { background: var(--success); border-color: var(--success); color: #fff; }
  .subtask-progress-bar {
    height: 3px; background: var(--panel-2); border-radius: 2px; margin-top: 5px; overflow: hidden;
  }
  .subtask-progress-fill { height: 100%; background: var(--success); border-radius: 2px; transition: width 0.3s; }
  .recur-badge {
    font-size: 0.65rem; padding: 1px 6px; border-radius: 4px;
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    color: var(--accent); font-weight: 700; letter-spacing: 0.3px;
  }

  /* =====================================================
     NOTA PINADA + BUSCA NOTAS
     ===================================================== */
  .note-pin-btn {
    position: absolute; top: 8px; right: 36px; font-size: 0.75rem;
    background: none; border: none; cursor: pointer; opacity: 0.5;
    transition: opacity 0.15s, transform 0.15s;
  }
  .note-pin-btn:hover { opacity: 1; transform: scale(1.2); }
  .note.pinned { border: 2px solid var(--accent); }
  .note-pin-indicator {
    position: absolute; top: 6px; left: 10px; font-size: 0.75rem; opacity: 0.7;
  }
  .notes-search {
    width: 100%; padding: 10px 14px; border-radius: 10px; margin-bottom: 14px;
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    font-size: 0.9rem;
  }
  .notes-search:focus { outline: none; border-color: var(--accent); }

  /* =====================================================
     OBJETIVOS — MARCOS
     ===================================================== */
  .milestone-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .milestone-item {
    display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text-dim);
    padding: 6px 10px; background: var(--panel-2); border-radius: 8px;
  }
  .milestone-item.done-ms { text-decoration: line-through; opacity: 0.55; }
  .milestone-cb {
    width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border-strong);
    flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; background: var(--bg);
  }
  .milestone-cb.checked { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ms-count { font-size: 0.72rem; color: var(--text-faint); margin-top: 4px; }

  /* DDD 3 colunas */
  .ddd-kanban { grid-template-columns: repeat(3, 1fr); }
  @media (max-width: 700px) { .ddd-kanban { grid-template-columns: 1fr; } }

</style>
</head>

<script>
/* =========================================================
   ZEN LIFE — Sistema Completo
   ========================================================= */

const STORAGE_KEY = 'zen-life-v1';
const DAYS = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
const DAYS_FULL = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

/* ---------- STATE ---------- */
const defaultState = {
  tasks: [],
  goals: [],
  planning: [],
  demands: [],
  routine: [],
  agenda: [],
  notes: [],
  reminders: [],
  gallery: [],
  pantry: [],
  storage: [],
  vault: [],
  miniGoals: [],
  settings: {
    theme: 'dark',
    accent: 'orange',
    font: 'sans',
    flipSound: true,
    keepAwake: false,
    pixelShift: false,
    haptic: true,
    pomodoroWork: 25,
    pomodoroBreak: 5,
    pomodoroLongBreak: 15,
    pomodoroCycles: 4,
  },
  pomoStats: { today: 0, total: 0, lastDate: '' },
  selectedDate: new Date().toISOString().slice(0,10),
};

let state = loadState();
let currentRoute = 'dashboard';
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return seedSample(structuredClone(defaultState));
    const parsed = JSON.parse(raw);
    return { ...structuredClone(defaultState), ...parsed,
             settings: { ...defaultState.settings, ...(parsed.settings||{}) } };
  } catch {
    return seedSample(structuredClone(defaultState));
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

/* Vault: archive completed tasks / goals. Idempotent — skips if already present. */
function addToVault(type, item) {
  if (!state.vault) state.vault = [];
  if (state.vault.some(v => v.type === type && v.ref === item.id)) return;
  state.vault.unshift({
    id: uid(), type, ref: item.id,
    title: item.title,
    completedAt: new Date().toISOString(),
    ...(type === 'task' ? { priority: item.priority } : { category: item.category }),
  });
  saveState();
}

function removeFromVault(type, refId) {
  if (!state.vault) return;
  state.vault = state.vault.filter(v => !(v.type === type && v.ref === refId));
  saveState();
}


function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function seedSample(s) {
  const today = new Date().toISOString().slice(0,10);
  s.tasks = [
    { id: uid(), title: 'Revisar e-mails', date: today, time: '09:00', priority: 'med', done: false, notes: '' },
    { id: uid(), title: 'Reunião de equipe', date: today, time: '14:00', priority: 'high', done: false, notes: 'Preparar slides' },
    { id: uid(), title: 'Treinar', date: today, time: '18:00', priority: 'low', done: false, notes: '' },
  ];
  s.goals = [
    { id: uid(), title: 'Ler 12 livros este ano', desc: 'Pelo menos 1 por mês', category: 'pessoal', progress: 35, deadline: `${new Date().getFullYear()}-12-31` },
    { id: uid(), title: 'Aprender React avançado', desc: 'Hooks, performance e testes', category: 'estudo', progress: 60, deadline: `${new Date().getFullYear()}-08-31` },
  ];
  s.routine = [
    { id: uid(), title: 'Beber água ao acordar', time: '07:00', done: {} },
    { id: uid(), title: 'Meditação', time: '07:15', done: {} },
    { id: uid(), title: 'Leitura noturna', time: '22:00', done: {} },
  ];
  s.notes = [
    { id: uid(), title: 'Ideias de projeto', text: 'Aplicativo de gestão pessoal\nDashboard financeiro\nFerramenta de hábitos', color: 5, date: today },
  ];
  s.reminders = [
    { id: uid(), text: 'Pagar conta de luz dia 20', date: today },
    { id: uid(), text: 'Comprar presente do aniversário', date: today },
  ];
  s.pantry = [
    { id: uid(), name: 'Arroz', qty: 2, unit: 'kg', min: 1 },
    { id: uid(), name: 'Café', qty: 0, unit: 'pacote', min: 1 },
  ];
  return s;
}

/* ---------- UTIL ---------- */
function $(sel, root = document) { return root.querySelector(sel); }
function $$(sel, root = document) { return [...root.querySelectorAll(sel)]; }

function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  for (const k in props) {
    if (k === 'class') e.className = props[k];
    else if (k === 'style' && typeof props[k] === 'object') Object.assign(e.style, props[k]);
    else if (k.startsWith('on') && typeof props[k] === 'function') e.addEventListener(k.slice(2).toLowerCase(), props[k]);
    else if (k === 'html') e.innerHTML = props[k];
    else if (k in e) e[k] = props[k];
    else e.setAttribute(k, props[k]);
  }
  children.flat().forEach(c => {
    if (c == null) return;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2200);
  if (state.settings.haptic && navigator.vibrate) navigator.vibrate(30);
}

function confirmDialog(msg) { return confirm(msg); }

/* ---------- MODAL ---------- */
function openModal(html, onMount) {
  $('#modalContent').innerHTML = html;
  $('#modalBackdrop').classList.add('open');
  if (onMount) onMount($('#modalContent'));
}
function closeModal() {
  $('#modalBackdrop').classList.remove('open');
}
$('#modalBackdrop').onclick = e => { if (e.target.id === 'modalBackdrop') closeModal(); };

/* ---------- THEME ---------- */
function applyTheme() {
  document.body.dataset.theme = state.settings.theme;
  document.body.dataset.accent = state.settings.accent;
  document.body.dataset.font = state.settings.font;
}

/* ---------- ROUTER ---------- */
function openPomodoro() {
  zenTab = 'pomodoro';
  $$('.zen-tab').forEach(t => t.classList.toggle('active', t.dataset.zen === 'pomodoro'));
  openZenMode(); // calls renderZen() internally
}

const routes = {
  dashboard:   renderDashboard,
  analytics:   renderAnalytics,
  estatisticas:renderAnalytics,
  zen:         openZenMode,
  pomodoro:    openZenMode,
  tasks:       renderTasks,
  objetivos:   renderObjetivos,
  goals:       renderObjetivos,
  metas:       renderMetas,
  ddd:         renderDDDPage,
  focus:       renderFocus,
  planning:    renderFocus,
  demands:     renderFocus,
  routine:     renderRoutine,
  habitos:     renderRoutine,
  agenda:      renderAgenda,
  notes:       renderNotesReminders,
  reminders:   () => renderNotesReminders('reminders'),
  gallery:     () => renderNotesReminders('gallery'),
  pantry:      renderPantry,
  settings:    renderSettings,
  diag:        renderDiagnostics,
};

function navigate(route) {
  if (route === 'zen')      { openZenMode();  return; }
  if (route === 'pomodoro') { openPomodoro(); return; }
  if (renderPanelClock._t) { clearInterval(renderPanelClock._t); renderPanelClock._t = null; }
  currentRoute = route;
  $$('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.route === route));
  toggleSidebar(false);
  (routes[route] || renderDashboard)();
}

function toggleSidebar(force) {
  const sidebar = $('#sidebar');
  const overlay = $('#sidebarOverlay');
  const isOpen = force !== undefined ? force : !sidebar.classList.contains('open');
  sidebar.classList.toggle('open', isOpen);
  overlay.classList.toggle('show', isOpen);

/* Swipe direita → abre sidebar | swipe esquerda → fecha sidebar (mobile) */
(function setupSwipe() {
  let startX = 0, startY = 0;
  const THRESHOLD = 60, EDGE = 30;

  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dy) > Math.abs(dx)) return; // swipe vertical — ignora
    if (Math.abs(dx) < THRESHOLD) return;

    const sidebar = $('#sidebar');
    if (dx > 0 && startX < EDGE && !sidebar.classList.contains('open')) {
      toggleSidebar(true);  // swipe da borda esquerda → abre
    } else if (dx < 0 && sidebar.classList.contains('open')) {
      toggleSidebar(false); // swipe para esquerda com sidebar aberta → fecha
    }
  }, { passive: true });
})();

/* =========================================================
   HABIT HELPERS
   ========================================================= */
/* Returns 'done' | 'failed' | 'neutral' for a habit on a given date */
function habitState(r, date) {
  const v = r.done?.[date];
  if (v === 'done' || v === true) return 'done';
  if (v === 'failed') return 'failed';
  return 'neutral';
}

/* Advances through neutral → done → failed → neutral */
function habitCycleState(r, date) {
  if (!r.done) r.done = {};
  const cur = habitState(r, date);
  if (cur === 'neutral') r.done[date] = 'done';
  else if (cur === 'done') r.done[date] = 'failed';
  else delete r.done[date];
}

/* Total all-time check-ins across all habits */
function calcTotalCheckIns() {
  return state.routine.reduce((sum, r) => {
    if (!r.done) return sum;
    return sum + Object.values(r.done).filter(v => v === 'done' || v === true).length;
  }, 0);
}

/* Longest ever consecutive streak (global, any habit done that day) */
function calcLongestEverStreak() {
  const now = new Date();
  let longest = 0, current = 0;
  for (let i = 729; i >= 0; i--) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    const dk = d.toISOString().slice(0,10);
    const di = d.getDay();
    const sched = state.routine.filter(r => !r.days || r.days.includes(di));
    if (!sched.length) continue;
    if (sched.some(r => habitState(r, dk) === 'done')) {
      current++;
      if (current > longest) longest = current;
    } else {
      current = 0;
    }
  }
  return longest;
}

/* =========================================================
   DASHBOARD
   ========================================================= */
function calcHabitStreak() {
  const now   = new Date();
  const today = now.toISOString().slice(0,10);
  if (!state.routine.length) return 0;
  let streak = 0;
  for (let i = 0; i <= 365; i++) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    const dk = d.toISOString().slice(0,10);
    const dayIdx = d.getDay();
    const scheduled = state.routine.filter(r => !r.days || r.days.includes(dayIdx));
    if (!scheduled.length) continue;
    const anyDone = scheduled.some(r => habitState(r, dk) === 'done');
    if (anyDone) streak++;
    else if (dk !== today) break;
  }
  return streak;
}

function calcHabitStreakFor(habit) {
  const now   = new Date();
  const today = now.toISOString().slice(0,10);
  let streak = 0;
  for (let i = 0; i <= 365; i++) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    const dk = d.toISOString().slice(0,10);
    const dayIdx = d.getDay();
    if (habit.days && !habit.days.includes(dayIdx)) continue;
    if (habitState(habit, dk) === 'done') streak++;
    else if (dk !== today) break;
  }
  return streak;
}

function renderCalendar() {
  const root = $('#calendarCard');
  if (!root) return;
  const today = new Date();
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysPrevMonth = new Date(calYear, calMonth, 0).getDate();

  let html = `
    <div class="cal-header" style="display:flex;align-items:center;gap:2px;margin-bottom:6px">
      <button class="cal-nav-btn cal-nav-year" id="calPrevYear" title="Ano anterior">«</button>
      <button class="cal-nav-btn" id="calPrev" title="Mês anterior">‹</button>
      <div style="flex:1;text-align:center">
        <span class="cal-title">${MONTHS[calMonth]} ${calYear}</span>
      </div>
      <button class="cal-nav-btn" id="calNext" title="Próximo mês">›</button>
      <button class="cal-nav-btn cal-nav-year" id="calNextYear" title="Próximo ano">»</button>
      <button class="cal-today-btn" id="calToday">hoje</button>
    </div>
    <div class="cal-grid">
  `;

  DAYS.forEach(d => html += `<div class="cal-dow">${d}</div>`);

  for (let i = firstDay - 1; i >= 0; i--) {
    html += `<div class="cal-cell other-month">${daysPrevMonth - i}</div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isSelected = state.selectedDate === dateStr;
    html += `<div class="cal-cell ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}" data-date="${dateStr}">${d}</div>`;
  }

  const total = firstDay + daysInMonth;
  const rem = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= rem; d++) {
    html += `<div class="cal-cell other-month">${d}</div>`;
  }

  html += '</div>';
  root.innerHTML = html;

  $('#calPrevYear').onclick = () => { calYear--; renderCalendar(); };
  $('#calNextYear').onclick = () => { calYear++; renderCalendar(); };
  $('#calPrev').onclick = () => {
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
  };
  $('#calNext').onclick = () => {
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
  };
  $('#calToday').onclick = () => {
    const now = new Date();
    calMonth = now.getMonth();
    calYear  = now.getFullYear();
    renderCalendar();
  };

  $$('.cal-cell[data-date]').forEach(c => {
    c.onclick = () => {
      state.selectedDate = c.dataset.date;
      saveState();
      navigate('tasks');
    };
  });
}

let timerState = { running: false, secondsLeft: 0, totalSec: 0, intervalId: null };

function openZenMode() {
  $('#zenMode').classList.add('open');
  renderZen();
  if (state.settings.keepAwake) requestWakeLock();
  if (state.settings.pixelShift) startPixelShift();

  $('#zenMode').classList.remove('open');

  stopPixelShift();

function renderZen() {
  if (zenClockInterval) { clearInterval(zenClockInterval); zenClockInterval = null; }

  else if (zenTab === 'pomodoro') renderPomodoro(body);
  else if (zenTab === 'timer') renderTimer(body);

/* --- Flip Clock --- */
function renderFlipClock(body) {
  const wrap = el('div', { style: { textAlign: 'center' } });
  const clock = el('div', { class: 'flip-clock' });

  const makeGroup = () => {
    const g = el('div', { class: 'flip-group' });
    const c1 = makeCard('0'), c2 = makeCard('0');
    g.appendChild(c1); g.appendChild(c2);
    return { g, cards: [c1, c2] };
  };

  const makeSep = () => {
    const d = el('div', { class: 'flip-separator' });
    d.innerHTML = '<span></span><span></span>';
    return d;
  };

  const h = makeGroup();
  const sep1 = makeSep();
  const m = makeGroup();
  const sep2 = makeSep();
  const s = makeGroup();

  clock.appendChild(h.g); clock.appendChild(sep1);
  clock.appendChild(m.g); clock.appendChild(sep2);
  clock.appendChild(s.g);
  wrap.appendChild(clock);

  const dateLbl = el('div', { class: 'zen-date' });
  wrap.appendChild(dateLbl);
  body.appendChild(wrap);

  const updateCard = (card, digit) => {
    const flapU  = card.querySelector('.fc-flap-u .fc-d');
    const upper  = card.querySelector('.fc-upper .fc-d');
    const lower  = card.querySelector('.fc-lower .fc-d');
    const flapL  = card.querySelector('.fc-flap-l .fc-d');

    const oldDigit = flapU.textContent;
    if (oldDigit === digit) return;

    // Cancela cleanup pendente de animação anterior
    if (card._ft) { clearTimeout(card._ft); card._ft = null; }

    // Estático superior recebe o novo dígito (revelado quando fc-flap-u sair)
    upper.textContent = digit;
    // Aba animada inferior já mostra o novo dígito
    flapL.textContent = digit;
    // fc-flap-u ainda mostra o oldDigit (não muda aqui) — vai girar para fora
    // fc-lower ainda mostra oldDigit — será coberta pela fc-flap-l durante fase 2

    card.classList.remove('flipping');
    void card.offsetWidth; // força reflow para reiniciar animação
    card.classList.add('flipping');

    // Fase 1: 0.25s  |  Fase 2: delay 0.25s + 0.25s = total 0.5s
    // Cleanup com margem segura em 0.56s — não depende de animationend
    card._ft = setTimeout(() => {
      card._ft = null;
      lower.textContent = digit;  // sincroniza metade inferior estática
      flapU.textContent = digit;  // sincroniza aba superior para próximo flip
      card.classList.remove('flipping'); // fc-flap-l volta a rotateX(90deg)
    }, 560);

    if (state.settings.flipSound) {
      playFlipSound(1);
      setTimeout(() => playFlipSound(2), 250);
    }
    if (state.settings.haptic && navigator.vibrate) navigator.vibrate(8);
  };

  const tick = () => {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    updateCard(h.cards[0], hh[0]); updateCard(h.cards[1], hh[1]);
    updateCard(m.cards[0], mm[0]); updateCard(m.cards[1], mm[1]);
    updateCard(s.cards[0], ss[0]); updateCard(s.cards[1], ss[1]);
    dateLbl.textContent = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  };

  tick();
  zenClockInterval = setInterval(tick, 1000);
}

function makeCard(digit) {
  const c = el('div', { class: 'flip-card' });
  c.innerHTML = `
    <div class="fc-upper"><span class="fc-d">${digit}</span></div>
    <div class="fc-lower"><span class="fc-d">${digit}</span></div>
    <div class="fc-flap-u"><span class="fc-d">${digit}</span></div>
    <div class="fc-flap-l"><span class="fc-d">${digit}</span></div>
  `;
  return c;
}

function playFlipSound(phase) {
  try {
    const ctx = playFlipSound._ctx
      || (playFlipSound._ctx = new (window.AudioContext || window.webkitAudioContext)());
    if (ctx.state === 'suspended') ctx.resume();
    const t = ctx.currentTime;

    if (phase === 1) {
      /* ── Fase 1: snap-out ──────────────────────────────────────
         A aba parte do suporte: clique seco e agudo, curto.
         Ruído branco com decaimento rápido (expoente 8)
         + bandpass centrado em ~900 Hz.
      ─────────────────────────────────────────────────────────── */
      const len = Math.ceil(ctx.sampleRate * 0.04);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const raw = buf.getChannelData(0);
      for (let i = 0; i < len; i++)
        raw[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 8);

      const src = ctx.createBufferSource();
      src.buffer = buf;

      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 900;
      bp.Q.value = 1.4;

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.30, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);

      src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
      src.start(t); src.stop(t + 0.04);

    } else {
      /* ── Fase 2: snap-in ───────────────────────────────────────
         A aba pousa: dois componentes.

         a) Clique de impacto — ruído com decaimento médio (exp 5)
            + bandpass grave (~420 Hz), um pouco mais longo e forte.

         b) Ressonância mecânica — oscilador senoidal que cai de
            110 Hz → 55 Hz (tom "plástico/cartão" ao pousar).
      ─────────────────────────────────────────────────────────── */

      // a) Impacto
      const len = Math.ceil(ctx.sampleRate * 0.055);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const raw = buf.getChannelData(0);
      for (let i = 0; i < len; i++)
        raw[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 5);

      const src = ctx.createBufferSource();
      src.buffer = buf;

      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 420;
      bp.Q.value = 2.0;

      const gImpact = ctx.createGain();
      gImpact.gain.setValueAtTime(0.45, t);
      gImpact.gain.exponentialRampToValueAtTime(0.001, t + 0.055);

      src.connect(bp); bp.connect(gImpact); gImpact.connect(ctx.destination);
      src.start(t); src.stop(t + 0.055);

      // b) Ressonância
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(110, t);
      osc.frequency.exponentialRampToValueAtTime(55, t + 0.055);

      const gRes = ctx.createGain();
      gRes.gain.setValueAtTime(0.20, t);
      gRes.gain.exponentialRampToValueAtTime(0.001, t + 0.055);

      osc.connect(gRes); gRes.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.055);
    }
  } catch {}
}

/* --- Pomodoro --- */
function renderPomodoro(body) {
  if (pomoState.secondsLeft === 0 && !pomoState.running) {
    pomoState.totalSec = state.settings.pomodoroWork * 60;
    pomoState.secondsLeft = pomoState.totalSec;
    pomoState.mode = 'work';
  }
  const checkDate = new Date().toISOString().slice(0,10);
  if (state.pomoStats.lastDate !== checkDate) {
    state.pomoStats.today = 0;
    state.pomoStats.lastDate = checkDate;
    saveState();
  }

  const wrap = el('div', { class: 'pomo-page' });
  const modeLbl = pomoState.mode === 'work' ? 'Foco' : pomoState.mode === 'break' ? 'Pausa Curta' : 'Pausa Longa';
  const ratio = pomoState.totalSec > 0 ? Math.max(0, pomoState.secondsLeft / pomoState.totalSec) : 1;
  const R = 100;
  const circ = 2 * Math.PI * R;
  const offset = circ - ratio * circ;

  wrap.innerHTML = `
    <div style="margin-bottom:14px">
      <div style="font-size:1.15rem;font-weight:800;color:var(--text)">Pomodoro</div>
      <div style="font-size:0.84rem;color:var(--text-dim);margin-top:3px">${state.pomoStats.today} sessão${state.pomoStats.today!==1?'ões':''} de foco concluída${state.pomoStats.today!==1?'s':''}</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px">
      <button class="btn ${pomoState.mode==='work'?'btn-primary':'btn-ghost'} btn-sm" id="pomoModeWork">🎯 Foco</button>
      <button class="btn ${pomoState.mode==='break'?'btn-primary':'btn-ghost'} btn-sm" id="pomoModeShort">☕ Pausa curta</button>
      <button class="btn ${pomoState.mode==='long'?'btn-primary':'btn-ghost'} btn-sm" id="pomoModeLong">🌙 Pausa longa</button>
    </div>
    <div class="pomo-circle-wrap">
      <svg class="pomo-circle-svg" viewBox="0 0 240 240">
        <circle class="pomo-circle-bg" cx="120" cy="120" r="${R}" />
        <circle class="pomo-circle-fg" cx="120" cy="120" r="${R}"
          stroke-dasharray="${circ.toFixed(1)}"
          stroke-dashoffset="${offset.toFixed(1)}"
          id="pomoCircleFg" />
      </svg>
      <div class="pomo-circle-center">
        <div class="pomo-circle-time" id="pomoDisplay">${fmtTime(pomoState.secondsLeft)}</div>
        <div class="pomo-circle-mode-lbl">${modeLbl.toUpperCase()}</div>
      </div>
    </div>
    <div class="pomo-controls">
      <button class="btn btn-primary" id="pomoToggle">${pomoState.running ? '⏸ Pausar' : '▶ Iniciar'}</button>
      <button class="btn btn-ghost" id="pomoReset">↻ Reiniciar</button>
    </div>
    <div class="pomo-stats" style="margin-top:22px">
      <div class="pomo-stat">
        <div class="pomo-stat-num">${state.pomoStats.today}</div>
        <div class="pomo-stat-lbl">Hoje</div>
      </div>
      <div class="pomo-stat">
        <div class="pomo-stat-num">${state.pomoStats.total}</div>
        <div class="pomo-stat-lbl">Total</div>
      </div>
      <div class="pomo-stat">
        <div class="pomo-stat-num">${pomoState.cycle}/${state.settings.pomodoroCycles}</div>
        <div class="pomo-stat-lbl">Ciclo</div>
      </div>
    </div>
  `;
  body.appendChild(wrap);

  $('#pomoToggle').onclick = togglePomo;
  $('#pomoReset').onclick = resetPomo;
  const $skip = $('#pomoSkip'); if ($skip) $skip.onclick = skipPomo;

  const switchPomoMode = (mode, secs) => {
    if (pomoState.running) { clearInterval(pomoState.intervalId); pomoState.intervalId = null; pomoState.running = false; }
    pomoState.mode = mode;
    pomoState.totalSec = secs * 60;
    pomoState.secondsLeft = pomoState.totalSec;
    renderZen();
  };
  $('#pomoModeWork').onclick  = () => switchPomoMode('work',  state.settings.pomodoroWork);
  $('#pomoModeShort').onclick = () => switchPomoMode('break', state.settings.pomodoroBreak);
  $('#pomoModeLong').onclick  = () => switchPomoMode('long',  state.settings.pomodoroLongBreak);

  if (pomoState.running) startPomoTick();
}

function togglePomo() {
  if (pomoState.running) {
    pomoState.running = false;
    clearInterval(pomoState.intervalId);
    pomoState.intervalId = null;
  } else {
    pomoState.running = true;
    // startPomoTick será chamado por renderPomodoro logo abaixo
  }
  renderZen();
}

function startPomoTick() {
  if (pomoState.intervalId) clearInterval(pomoState.intervalId);
  pomoState.intervalId = setInterval(() => {
    pomoState.secondsLeft--;
    const disp = $('#pomoDisplay');
    const fg   = $('#pomoCircleFg');
    if (disp) disp.textContent = fmtTime(pomoState.secondsLeft);
    if (fg && pomoState.totalSec > 0) {
      const R = 100, circ = 2 * Math.PI * R;
      const ratio = Math.max(0, pomoState.secondsLeft / pomoState.totalSec);
      fg.setAttribute('stroke-dashoffset', (circ - ratio * circ).toFixed(1));
    }
    if (pomoState.secondsLeft <= 0) {
      clearInterval(pomoState.intervalId);
      pomoState.running = false;
      notifyDone(pomoState.mode === 'work' ? 'Foco concluído! Hora da pausa.' : 'Pausa terminou! De volta ao foco.');
      advancePomo();
      renderZen();
    }
  }, 1000);
}

function advancePomo() {
  if (pomoState.mode === 'work') {
    state.pomoStats.today++;
    state.pomoStats.total++;
    saveState();
    if (pomoState.cycle % state.settings.pomodoroCycles === 0) {
      pomoState.mode = 'long';
      pomoState.totalSec = state.settings.pomodoroLongBreak * 60;
    } else {
      pomoState.mode = 'break';
      pomoState.totalSec = state.settings.pomodoroBreak * 60;
    }
  } else {
    pomoState.mode = 'work';
    pomoState.totalSec = state.settings.pomodoroWork * 60;
    pomoState.cycle++;
  }
  pomoState.secondsLeft = pomoState.totalSec;
}

function resetPomo() {
  clearInterval(pomoState.intervalId);
  pomoState = { running: false, mode: 'work', secondsLeft: state.settings.pomodoroWork * 60,
                totalSec: state.settings.pomodoroWork * 60, cycle: 1, intervalId: null };
  renderZen();
}

function skipPomo() {
  clearInterval(pomoState.intervalId);
  pomoState.running = false;
  advancePomo();
  renderZen();
}

function fmtTime(sec) {
  const t = Math.max(0, Math.floor(sec));
  const h = Math.floor(t / 3600);
  const m = Math.floor((t % 3600) / 60);
  const s = t % 60;
  if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* --- Timer --- */
function renderTimer(body) {
  const atZero  = timerState.secondsLeft === 0 && !timerState.running;
  const paused  = !timerState.running && timerState.secondsLeft > 0;
  const running = timerState.running;

  // Defaults dos inputs baseados no último totalSec usado
  const defH = timerState.totalSec > 0 ? Math.floor(timerState.totalSec / 3600) : 0;
  const defM = timerState.totalSec > 0 ? Math.floor((timerState.totalSec % 3600) / 60) : 5;
  const defS = timerState.totalSec > 0 ? timerState.totalSec % 60 : 0;

  const progress = timerState.totalSec > 0
    ? (1 - timerState.secondsLeft / timerState.totalSec) * 100
    : 0;

  const btnLabel = running ? '⏸ Pausar' : paused ? '▶ Retomar' : '▶ Iniciar';

  const wrap = el('div', { class: 'timer-page' });
  wrap.innerHTML = `
    <div class="pomo-mode-badge">${running ? 'Contando…' : paused ? 'Pausado' : 'Temporizador'}</div>
    <div class="timer-display" id="timerDisplay">${fmtTime(timerState.secondsLeft)}</div>
    ${!atZero ? `<div class="pomo-ring"><div class="pomo-ring-fill" id="timerRing" style="width:${progress}%"></div></div>` : ''}
    ${atZero ? `
      <div class="timer-inputs">
        <div class="timer-input-group"><span class="timer-input-lbl">H</span><input type="number" min="0" max="23" class="timer-input" id="tH" value="${defH}" /></div>
        <div class="timer-input-group"><span class="timer-input-lbl">M</span><input type="number" min="0" max="59" class="timer-input" id="tM" value="${defM}" /></div>
        <div class="timer-input-group"><span class="timer-input-lbl">S</span><input type="number" min="0" max="59" class="timer-input" id="tS" value="${defS}" /></div>
      </div>
    ` : ''}
    <div class="pomo-controls">
      <button class="btn btn-primary" id="tStart">${btnLabel}</button>
      <button class="btn btn-ghost" id="tReset">↻ Reset</button>
    </div>
    <div class="timer-presets">
      <div class="timer-preset" data-sec="60">1 min</div>
      <div class="timer-preset" data-sec="300">5 min</div>
      <div class="timer-preset" data-sec="600">10 min</div>
      <div class="timer-preset" data-sec="1500">25 min</div>
      <div class="timer-preset" data-sec="2700">45 min</div>
    </div>
  `;
  body.appendChild(wrap);

  $('#tStart').onclick = () => {
    if (timerState.running) {
      timerState.running = false;
      clearInterval(timerState.intervalId);
      timerState.intervalId = null;
      renderZen();
      return;
    }

    if (timerState.secondsLeft === 0) {
      const h = +($('#tH')?.value ?? 0);
      const m = +($('#tM')?.value ?? 0);
      const s = +($('#tS')?.value ?? 0);
      timerState.totalSec    = h * 3600 + m * 60 + s;
      timerState.secondsLeft = timerState.totalSec;
      if (timerState.secondsLeft === 0) { toast('Configure um tempo'); return; }
    }

    if (timerState.intervalId) clearInterval(timerState.intervalId);
    timerState.running = true;
    timerState.intervalId = setInterval(() => {
      timerState.secondsLeft--;
      const d = $('#timerDisplay');
      const r = $('#timerRing');
      if (d) d.textContent = fmtTime(timerState.secondsLeft);
      if (r) r.style.width = `${(1 - timerState.secondsLeft / timerState.totalSec) * 100}%`;
      if (timerState.secondsLeft <= 0) {
        clearInterval(timerState.intervalId);
        timerState.intervalId = null;
        timerState.running    = false;
        timerState.secondsLeft = 0;
        notifyDone('⏰ Timer concluído!');
        renderZen();
      }
    }, 1000);
    renderZen(); // re-renderiza para mostrar barra de progresso e esconder inputs
  };

  $('#tReset').onclick = () => {
    clearInterval(timerState.intervalId);
    timerState = { running: false, secondsLeft: 0, totalSec: timerState.totalSec, intervalId: null };
    renderZen();
  };

  $$('.timer-preset').forEach(p => p.onclick = () => {
    clearInterval(timerState.intervalId);
    timerState = { running: false, secondsLeft: +p.dataset.sec, totalSec: +p.dataset.sec, intervalId: null };
    renderZen();
  });
}

function notifyDone(msg) {
  toast(msg);
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < 3; i++) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.2, ctx.currentTime + i*0.3);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.3 + 0.2);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + i*0.3); o.stop(ctx.currentTime + i*0.3 + 0.2);
    }
  } catch {}
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
  if (window.Notification?.permission === 'granted') new window.Notification('Routines for Success', { body: msg });
}

/* --- Wake Lock --- */
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

/* --- Pixel Shifting --- */
function startPixelShift() {
  stopPixelShift();
  const body = $('#zenBody');
  if (!body) return;
  pixelShiftInterval = setInterval(() => {
    const x = Math.floor(Math.random() * 5) - 2;
    const y = Math.floor(Math.random() * 5) - 2;
    body.style.transform = `translate(${x}px, ${y}px)`;
  }, 30000);
}
function stopPixelShift() {
  if (pixelShiftInterval) clearInterval(pixelShiftInterval);
  const body = $('#zenBody');
  if (body) body.style.transform = '';
}

/* =========================================================
   TAREFAS
   ========================================================= */
function renderTasks() {
  const date = state.selectedDate || new Date().toISOString().slice(0,10);
  const dayTasks = state.tasks
    .filter(t => t.date === date)
    .sort((a, b) => (a.time || '').localeCompare(b.time || ''));

  $('#main').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Tarefas</div>
        <div class="page-subtitle">${new Date(date+'T00:00:00').toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' })}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="date" value="${date}" id="taskDate" style="background:var(--panel);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:10px"/>
        <button class="btn btn-primary" id="addTaskBtn">+ Nova Tarefa</button>
      </div>
    </div>
    <div class="list-container" id="taskList"></div>
  `;

  $('#taskDate').onchange = e => { state.selectedDate = e.target.value; saveState(); renderTasks(); };
  $('#addTaskBtn').onclick = () => taskModal();

  const root = $('#taskList');
  if (!dayTasks.length) {
    root.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><h3>Sem tarefas para este dia</h3><p>Clique em "Nova Tarefa" para começar</p></div>`;
    return;
  }

  root.innerHTML = dayTasks.map(t => {
    const subs = t.subtasks || [];
    const subsDone = subs.filter(s => s.done).length;
    const subsPct = subs.length ? Math.round(subsDone / subs.length * 100) : 0;
    const recurLabels = { daily:'Diária', weekdays:'Dias úteis', weekly:'Semanal', monthly:'Mensal' };
    return `
    <div class="item prio-${t.priority||'med'} ${t.done?'done':''}" data-tid="${t.id}">
      <div class="item-checkbox ${t.done?'checked':''}" data-toggle="${t.id}"></div>
      <div class="item-body" style="width:100%">
        <div class="item-title">${escapeHtml(t.title)}</div>
        <div class="item-meta">
          ${t.time ? `<span>⏰ ${t.time}</span>` : ''}
          <span class="badge ${t.priority||'med'}">${({high:'Alta',med:'Média',low:'Baixa'})[t.priority||'med']}</span>
          ${t.recur && t.recur !== 'none' ? `<span class="recur-badge">↻ ${recurLabels[t.recur]||t.recur}</span>` : ''}
          ${subs.length ? `<span style="color:var(--text-faint);font-size:0.78rem">✓ ${subsDone}/${subs.length}</span>` : ''}
          ${t.notes ? `<span style="color:var(--text-faint)">${escapeHtml(t.notes)}</span>` : ''}
        </div>
        ${subs.length ? `
          <div class="subtask-progress-bar"><div class="subtask-progress-fill" style="width:${subsPct}%"></div></div>
          <div class="subtask-list" id="subs-${t.id}">
            ${subs.map(s => `
              <div class="subtask-item ${s.done?'done-sub':''}">
                <div class="subtask-cb ${s.done?'checked':''}" data-sub="${s.id}" data-tid="${t.id}">${s.done?'✓':''}</div>
                <span>${escapeHtml(s.text)}</span>
              </div>`).join('')}
          </div>` : ''}
      </div>
      <div class="item-actions">
        <button class="icon-btn" data-edit="${t.id}" title="Editar">✏️</button>
        <button class="icon-btn danger" data-del="${t.id}" title="Excluir">🗑️</button>
      </div>
    </div>`;
  }).join('');

  $$('[data-toggle]', root).forEach(el => el.onclick = () => {
    const t = state.tasks.find(x => x.id === el.dataset.toggle);
    t.done = !t.done;
    if (t.done) {
      addToVault('task', t);
      if (t.recur && t.recur !== 'none') {
        const next = {...t, id: uid(), done: false, subtasks: (t.subtasks||[]).map(s=>({...s,done:false}))};
        const d = new Date(t.date+'T00:00:00');
        if (t.recur === 'daily') d.setDate(d.getDate()+1);
        else if (t.recur === 'weekdays') { d.setDate(d.getDate()+1); while ([0,6].includes(d.getDay())) d.setDate(d.getDate()+1); }
        else if (t.recur === 'weekly') d.setDate(d.getDate()+7);
        else if (t.recur === 'monthly') d.setMonth(d.getMonth()+1);
        next.date = d.toISOString().slice(0,10);
        state.tasks.push(next);
        toast('Próxima recorrência criada');
      }
    } else { removeFromVault('task', t.id); }
    saveState(); renderTasks();
  });
  $$('[data-sub]', root).forEach(el => el.onclick = e => {
    e.stopPropagation();
    const t = state.tasks.find(x => x.id === el.dataset.tid);
    if (!t || !t.subtasks) return;
    const s = t.subtasks.find(x => x.id === el.dataset.sub);
    if (s) { s.done = !s.done; saveState(); renderTasks(); }
  });
  $$('[data-edit]', root).forEach(el => el.onclick = () => taskModal(el.dataset.edit));
  $$('[data-del]', root).forEach(el => el.onclick = () => {
    if (!confirmDialog('Excluir tarefa?')) return;
    state.tasks = state.tasks.filter(x => x.id !== el.dataset.del);
    saveState(); renderTasks(); toast('Tarefa excluída');
  });
}

function taskModal(id) {
  const t = id ? state.tasks.find(x => x.id === id) : { date: state.selectedDate, priority: 'med', recur: 'none', subtasks: [] };
  const existingSubs = (t.subtasks||[]);
  let localSubs = existingSubs.map(s => ({...s}));

  const renderSubsHTML = () => localSubs.map((s,i) => `
    <div style="display:flex;align-items:center;gap:6px;margin-top:5px">
      <input class="input sub-text-input" data-si="${i}" value="${escapeHtml(s.text)}" style="flex:1;padding:6px 10px;font-size:0.82rem" placeholder="Subtarefa ${i+1}">
      <button type="button" class="icon-btn danger sub-del" data-si="${i}" style="flex-shrink:0">✕</button>
    </div>`).join('');

  openModal(`
    <div class="modal-title">${id ? 'Editar' : 'Nova'} Tarefa</div>
    <form id="taskForm">
      <div class="field"><label>Título</label><input id="fTitle" required value="${escapeHtml(t.title||'')}" /></div>
      <div class="field-row">
        <div class="field"><label>Data</label><input type="date" id="fDate" value="${t.date||state.selectedDate}" required /></div>
        <div class="field"><label>Horário</label><input type="time" id="fTime" value="${t.time||''}" /></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Prioridade</label>
          <select id="fPrio">
            <option value="low" ${t.priority==='low'?'selected':''}>Baixa</option>
            <option value="med" ${t.priority==='med'?'selected':''}>Média</option>
            <option value="high" ${t.priority==='high'?'selected':''}>Alta</option>
          </select>
        </div>
        <div class="field"><label>Recorrência</label>
          <select id="fRecur">
            <option value="none" ${(!t.recur||t.recur==='none')?'selected':''}>Nenhuma</option>
            <option value="daily" ${t.recur==='daily'?'selected':''}>Diária</option>
            <option value="weekdays" ${t.recur==='weekdays'?'selected':''}>Dias úteis</option>
            <option value="weekly" ${t.recur==='weekly'?'selected':''}>Semanal</option>
            <option value="monthly" ${t.recur==='monthly'?'selected':''}>Mensal</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Notas</label><textarea id="fNotes">${escapeHtml(t.notes||'')}</textarea></div>
      <div class="field">
        <label style="display:flex;justify-content:space-between;align-items:center">
          Subtarefas
          <button type="button" class="btn btn-ghost btn-sm" id="addSubBtn" style="font-size:0.75rem;padding:3px 10px">+ Adicionar</button>
        </label>
        <div id="subsContainer">${renderSubsHTML()}</div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  `, m => {
    const refreshSubs = () => {
      m.querySelector('#subsContainer').innerHTML = renderSubsHTML();
      m.querySelectorAll('.sub-del').forEach(btn => btn.onclick = () => { localSubs.splice(+btn.dataset.si,1); refreshSubs(); });
      m.querySelectorAll('.sub-text-input').forEach(inp => inp.oninput = () => { localSubs[+inp.dataset.si].text = inp.value; });
    };
    refreshSubs();
    m.querySelector('#addSubBtn').onclick = () => { localSubs.push({id:uid(),text:'',done:false}); refreshSubs(); };
    $('#taskForm', m).onsubmit = e => {
      e.preventDefault();
      const data = {
        title: $('#fTitle').value.trim(),
        date: $('#fDate').value,
        time: $('#fTime').value,
        priority: $('#fPrio').value,
        recur: $('#fRecur').value,
        notes: $('#fNotes').value.trim(),
        subtasks: localSubs.filter(s => s.text.trim()),
      };
      if (id) Object.assign(t, data);
      else state.tasks.push({ id: uid(), ...data, done: false });
      saveState(); closeModal(); renderTasks(); toast(id ? 'Atualizada' : 'Criada');
    };
  });
}

/* =========================================================
   OBJETIVOS — metas com barra de progresso

function renderObjetivos() {
  $('#main').innerHTML = `
    <div class="page-header" style="margin-bottom:0;padding-bottom:0">
      <div><div class="page-title">Objetivos</div><div class="page-subtitle">Metas com acompanhamento</div></div>
      <button class="btn btn-primary" id="objAddBtn">+ Nova Meta</button>
    </div>
    <div id="objBody" style="margin-top:18px"></div>
  `;

    root.innerHTML = `<div class="empty"><div class="empty-icon">🎯</div><h3>Sem objetivos ainda</h3><p>Crie seu primeiro objetivo</p></div>`;

  }
  root.innerHTML = `<div class="goal-grid">
    ${state.goals.map(g => `
      <div class="goal-card">
        <div class="goal-card-header">
          <div>
            <div class="goal-title">${escapeHtml(g.title)}</div>
            <span class="badge">${escapeHtml(g.category||'geral')}</span>
          </div>
          <div style="display:flex;gap:4px">
            <button class="icon-btn" data-gedit="${g.id}">✏️</button>
            <button class="icon-btn danger" data-gdel="${g.id}">🗑️</button>
          </div>
        </div>
        <div class="goal-desc">${escapeHtml(g.desc||'')}</div>
        <div class="goal-bar-wrap"><div class="goal-bar-fill" style="width:${g.progress||0}%"></div></div>
        <div class="goal-meta">
          <span>${g.progress||0}%</span>
          ${g.deadline ? `<span>${new Date(g.deadline+'T00:00:00').toLocaleDateString('pt-BR')}</span>` : '<span></span>'}
        </div>
        <input type="range" min="0" max="100" value="${g.progress||0}" class="goal-progress-input" data-grange="${g.id}" />
        ${(g.milestones||[]).length ? `
          <div class="milestone-list">
            ${(g.milestones||[]).map(ms=>`
              <div class="milestone-item ${ms.done?'done-ms':''}">
                <div class="milestone-cb ${ms.done?'checked':''}" data-msid="${ms.id}" data-gid="${g.id}">${ms.done?'✓':''}</div>
                <span>${escapeHtml(ms.text)}</span>
              </div>`).join('')}
          </div>
          <div class="ms-count">${(g.milestones||[]).filter(m=>m.done).length}/${(g.milestones||[]).length} marcos</div>` : ''}
      </div>`).join('')}

  $$('[data-gedit]', root).forEach(el => el.onclick = () => goalModal(el.dataset.gedit));

  $$('[data-grange]', root).forEach(el => el.oninput = () => {

  });

    const ms = g.milestones.find(m => m.id === el.dataset.msid);

/* =========================================================
   DDD — Demandas Do Dia (kanban)
   ========================================================= */
function renderDDDPage() {
  $('#main').innerHTML = `
    <div class="page-header" style="margin-bottom:0;padding-bottom:0">
      <div><div class="page-title">DDD</div><div class="page-subtitle">Demandas Do Dia</div></div>
      <button class="btn btn-primary" id="dddAddBtn">+ Demanda</button>
    </div>
    <div id="dddKanbanWrap" style="margin-top:18px"><div class="ddd-kanban" id="dddKanban"></div></div>
  `;
  $('#dddAddBtn').onclick = () => demandModal(null, renderDDDPage);

  const renderKanban = () => {
    const todo    = state.demands.filter(d => !d.done && d.urgency === 'low');
    const temque  = state.demands.filter(d => !d.done && (d.urgency === 'high' || d.urgency === 'med' || !d.urgency));
    const concluidos = state.demands.filter(d => d.done);

    const itemHtml = (d, fromCol) => `
      <div class="kanban-item">
        <span class="kanban-drag-handle">⠿</span>
        <span class="kanban-item-text" style="${d.done?'text-decoration:line-through;opacity:.6':''}">${escapeHtml(d.title)}</span>
        <div class="kanban-item-actions">
          ${fromCol !== 'done' ? `<button class="kanban-action-btn" data-kdone="${d.id}" title="Concluir" style="color:var(--success)">✓</button>` : ''}
          ${fromCol !== 'done' ? `<button class="kanban-action-btn" data-ktr="${d.id}" data-from="${fromCol}" title="Mover coluna">⇄</button>` : ''}
          ${fromCol === 'done' ? `<button class="kanban-action-btn" data-kundo="${d.id}" title="Reabrir">↩</button>` : ''}
          <button class="kanban-action-btn kdanger" data-kdel="${d.id}" title="Excluir">✕</button>
        </div>
      </div>`;

    const colHtml = (meta, title, items, col, hideAdd) => `
      <div class="kanban-col">
        <div class="kanban-col-hdr">
          <div><div class="kanban-col-meta">${meta}</div><div class="kanban-col-title">${title}</div></div>
          <div class="kanban-col-badge">${items.length}</div>
        </div>
        ${!hideAdd ? `<div class="kanban-quick-add">
          <input class="kanban-quick-input" placeholder='Adicionar em "${title}"...' data-col="${col}" />
          <button class="kanban-add-btn" data-addcol="${col}">+</button>
        </div>` : ''}
        <div class="kanban-items">
          ${items.length ? items.map(d => itemHtml(d, col)).join('') : '<div class="kanban-empty">Nenhuma demanda</div>'}
        </div>
      </div>`;

    const kanban = $('#dddKanban');
    if (!kanban) return;
    kanban.innerHTML =
      colHtml('QUERO FAZER',   'To-do',      todo,       'todo')  +
      colHtml('PRECISO FAZER', 'Tem que',    temque,     'temque') +
      colHtml('CONCLUÍDO',     'Concluído',  concluidos, 'done', true);

    $$('.kanban-add-btn').forEach(btn => {
      const col = btn.dataset.addcol;
      const input = btn.previousElementSibling;
      const add = () => {
        const title = input.value.trim();
        if (!title) return;
        state.demands.push({ id: uid(), title, urgency: col === 'todo' ? 'low' : 'high', done: false, context: '' });
        saveState(); renderKanban(); toast('Demanda adicionada');
      };
      btn.onclick = add;
      input.onkeydown = e => { if (e.key === 'Enter') add(); };
    });
    $$('[data-kdone]').forEach(btn => btn.onclick = () => {
      const d = state.demands.find(x => x.id === btn.dataset.kdone);
      if (d) { d.done = true; saveState(); renderKanban(); toast('Demanda concluída ✓'); }
    });
    $$('[data-kundo]').forEach(btn => btn.onclick = () => {
      const d = state.demands.find(x => x.id === btn.dataset.kundo);
      if (d) { d.done = false; d.urgency = d.urgency || 'high'; saveState(); renderKanban(); }
    });
    $$('[data-ktr]').forEach(btn => btn.onclick = () => {
      const d = state.demands.find(x => x.id === btn.dataset.ktr);
      if (!d) return;
      d.urgency = btn.dataset.from === 'todo' ? 'high' : 'low';
      saveState(); renderKanban();
    });
    $$('[data-kdel]').forEach(btn => btn.onclick = () => {
      if (!confirmDialog('Excluir demanda?')) return;
      state.demands = state.demands.filter(x => x.id !== btn.dataset.kdel);
      saveState(); renderKanban();
    });
  };

  renderKanban();
}

   METAS — mini metas / objetivos rápidos

function renderMetas() {
  const miniGoals = state.miniGoals || [];

  $('#main').innerHTML = `
    <div class="page-header" style="margin-bottom:0;padding-bottom:0">
      <div><div class="page-title">Metas</div><div class="page-subtitle">Objetivos rápidos e mini metas</div></div>
      <button class="btn btn-primary" id="metasAddBtn">+ Nova Meta</button>
    </div>
    <div id="metasBody" style="margin-top:18px"></div>
  `;
  $('#metasAddBtn').onclick = () => miniGoalModal();

  const root = $('#metasBody');
  if (!miniGoals.length) {
    root.innerHTML = `<div class="empty"><div class="empty-icon">⭐</div><h3>Sem metas ainda</h3><p>Crie sua primeira meta</p></div>`;
    return;
  }

  const pending = miniGoals.filter(m => !m.done);
  const done    = miniGoals.filter(m =>  m.done);

  const itemHtml = m => `
    <div class="item ${m.done?'done':''}">
      <div class="item-checkbox ${m.done?'checked':''}" data-mtoggle="${m.id}"></div>
      <div class="item-body">
        <div class="item-title">${escapeHtml(m.title)}</div>
        <div class="item-meta">
          <span class="badge">${escapeHtml(m.category||'geral')}</span>
          ${m.deadline ? `<span>${new Date(m.deadline+'T00:00:00').toLocaleDateString('pt-BR')}</span>` : ''}
        </div>
      </div>
      <div class="item-actions">
        ${!m.done ? `<button class="icon-btn" data-medit="${m.id}">✏️</button>` : ''}
        <button class="icon-btn danger" data-mdel="${m.id}">🗑️</button>
      </div>
    </div>`;

  root.innerHTML = `
    <div class="list-container">
      ${pending.map(itemHtml).join('')}
      ${done.length ? `
        <div class="vault-sub-hdr" style="border-left:3px solid var(--success);margin-top:12px">
          <span>✓ Concluídas</span><span class="pantry-count">${done.length}</span>
        </div>
        ${done.map(itemHtml).join('')}` : ''}
    </div>`;

  $$('[data-mtoggle]', root).forEach(el => el.onclick = () => {
    const m = state.miniGoals.find(x => x.id === el.dataset.mtoggle);
    if (!m) return;
    m.done = !m.done;
    if (m.done) addToVault('minigoal', m); else removeFromVault('minigoal', m.id);
    saveState(); renderMetas();
  });
  $$('[data-medit]', root).forEach(el => el.onclick = () => miniGoalModal(el.dataset.medit));
  $$('[data-mdel]',  root).forEach(el => el.onclick = () => {
    if (!confirmDialog('Excluir meta?')) return;
    state.miniGoals = state.miniGoals.filter(x => x.id !== el.dataset.mdel);
    saveState(); renderMetas();
  });
}

        <div class="page-title">🎯 Metas</div>

    <div class="inner-tabs">
      <button class="inner-tab ${active==='goals'?'active':''}" data-gtab="goals">
        🎯 Metas <span class="inner-tab-count">${state.goals.length}</span>
      </button>
      <button class="inner-tab ${active==='mini'?'active':''}" data-gtab="mini">

      </button>
    </div>

    <div id="goalsBody"></div>
  `;

    _goalsTab = btn.dataset.gtab;
    renderGoals();
  });

  const body = $('#goalsBody');

  /* =================== ABA METAS =================== */
  if (active === 'goals') {
    if (!state.goals.length) {
      body.innerHTML = `<div class="empty"><div class="empty-icon">🎯</div><h3>Sem metas ainda</h3><p>Crie sua primeira meta</p></div>`;
      return;
    }

    body.innerHTML = `<div class="goal-grid" id="goalGrid">
      ${state.goals.map(g => `
        <div class="goal-card" data-id="${g.id}">
          <div class="goal-card-header">
            <div>
              <div class="goal-title">${escapeHtml(g.title)}</div>
              <span class="badge">${escapeHtml(g.category||'geral')}</span>
            </div>
            <div style="display:flex;gap:4px">
              <button class="icon-btn" data-edit="${g.id}">✏️</button>
              <button class="icon-btn danger" data-del="${g.id}">🗑️</button>
            </div>
          </div>
          <div class="goal-desc">${escapeHtml(g.desc||'')}</div>
          <div class="goal-bar-wrap"><div class="goal-bar-fill" style="width:${g.progress||0}%"></div></div>
          <div class="goal-meta">
            <span>${g.progress||0}%</span>
            <span>${g.deadline ? '📅 ' + new Date(g.deadline+'T00:00:00').toLocaleDateString('pt-BR') : 'Sem prazo'}</span>
          </div>
          <input type="range" min="0" max="100" value="${g.progress||0}" class="goal-progress-input" data-prog="${g.id}" />
        </div>`).join('')}
    </div>`;

    $$('[data-prog]', body).forEach(el => el.oninput = e => {
      const g = state.goals.find(x => x.id === el.dataset.prog);
      g.progress = +e.target.value;
      if (g.progress === 100) addToVault('goal', g);
      else removeFromVault('goal', g.id);
      saveState();
      const card = el.closest('.goal-card');
      card.querySelector('.goal-bar-fill').style.width = g.progress+'%';
      card.querySelector('.goal-meta span').textContent = g.progress+'%';
    });
    $$('[data-edit]', body).forEach(el => el.onclick = () => goalModal(el.dataset.edit));
    $$('[data-del]', body).forEach(el => el.onclick = () => {
      if (!confirmDialog('Excluir meta?')) return;
      state.goals = state.goals.filter(x => x.id !== el.dataset.del);
      saveState(); renderGoals();
    });

  /* =================== ABA MINI METAS =================== */
  } else {
    const pending = miniGoals.filter(m => !m.done);
    const done    = miniGoals.filter(m =>  m.done);

    if (!miniGoals.length) {
      body.innerHTML = `<div class="empty"><div class="empty-icon">⭐</div><h3>Sem mini metas</h3><p>Mini metas são objetivos rápidos e simples de marcar</p></div>`;
      return;
    }

    const itemHtml = m => `
      <div class="item ${m.done?'done':''}">
        <div class="item-checkbox ${m.done?'checked':''}" data-mtoggle="${m.id}"></div>
        <div class="item-body">
          <div class="item-title">${escapeHtml(m.title)}</div>
          <div class="item-meta">
            ${m.category ? `<span class="badge">${escapeHtml(m.category)}</span>` : ''}
            ${m.deadline ? `<span>📅 ${new Date(m.deadline+'T00:00:00').toLocaleDateString('pt-BR')}</span>` : ''}
          </div>
        </div>
        <div class="item-actions">
          ${!m.done ? `<button class="icon-btn" data-medit="${m.id}">✏️</button>` : ''}
          <button class="icon-btn danger" data-mdel="${m.id}">🗑️</button>
        </div>
      </div>`;

    body.innerHTML = `
      <div class="list-container" id="miniList">
        ${pending.map(itemHtml).join('')}
        ${done.length > 0 ? `
          <div class="vault-sub-hdr" style="border-left:3px solid var(--success);${pending.length?'margin-top:12px':''}">
            <span>✓ Concluídas</span><span class="pantry-count">${done.length}</span>
          </div>
          ${done.map(itemHtml).join('')}
        ` : ''}
      </div>`;

    $$('[data-mtoggle]', body).forEach(el => el.onclick = () => {
      const m = miniGoals.find(x => x.id === el.dataset.mtoggle);
      if (!m) return;
      m.done = !m.done;
      if (m.done) addToVault('minigoal', m); else removeFromVault('minigoal', m.id);
      saveState(); renderGoals();
    });
    $$('[data-medit]', body).forEach(el => el.onclick = () => miniGoalModal(el.dataset.medit));
    $$('[data-mdel]', body).forEach(el => el.onclick = () => {
      if (!confirmDialog('Excluir mini meta?')) return;
      state.miniGoals = state.miniGoals.filter(x => x.id !== el.dataset.mdel);
      saveState(); renderGoals();
    });
  }
}

function goalModal(id) {
  const g = id ? state.goals.find(x => x.id === id) : { progress: 0, category: 'pessoal', milestones: [] };
  let localMs = (g.milestones||[]).map(m=>({...m}));

  const renderMsHTML = () => localMs.map((ms,i) => `
    <div style="display:flex;align-items:center;gap:6px;margin-top:5px">
      <input class="input ms-text-input" data-mi="${i}" value="${escapeHtml(ms.text||'')}" style="flex:1;padding:6px 10px;font-size:0.82rem" placeholder="Marco ${i+1}">
      <button type="button" class="icon-btn danger ms-del" data-mi="${i}" style="flex-shrink:0">✕</button>
    </div>`).join('');

  openModal(`
    <div class="modal-title">${id?'Editar':'Nova'} Meta</div>
    <form id="goalForm">
      <div class="field"><label>Título</label><input id="gTitle" required value="${escapeHtml(g.title||'')}" /></div>
      <div class="field"><label>Descrição</label><textarea id="gDesc">${escapeHtml(g.desc||'')}</textarea></div>
      <div class="field-row">
        <div class="field"><label>Categoria</label>
          <select id="gCat">
            <option value="pessoal" ${g.category==='pessoal'?'selected':''}>Pessoal</option>
            <option value="estudo" ${g.category==='estudo'?'selected':''}>Estudo</option>
            <option value="trabalho" ${g.category==='trabalho'?'selected':''}>Trabalho</option>
            <option value="saude" ${g.category==='saude'?'selected':''}>Saúde</option>
            <option value="financeiro" ${g.category==='financeiro'?'selected':''}>Financeiro</option>
            <option value="geral" ${g.category==='geral'?'selected':''}>Geral</option>
          </select>
        </div>
        <div class="field"><label>Prazo Final</label><input type="date" id="gDeadline" value="${g.deadline||''}" /></div>
      </div>
      <div class="field"><label>Progresso (%)</label><input type="number" id="gProg" min="0" max="100" value="${g.progress||0}" /></div>
      <div class="field">
        <label style="display:flex;justify-content:space-between;align-items:center">
          Marcos / Etapas
          <button type="button" class="btn btn-ghost btn-sm" id="addMsBtn" style="font-size:0.75rem;padding:3px 10px">+ Marco</button>
        </label>
        <div id="msContainer">${renderMsHTML()}</div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </div>
    </form>
  `, m => {
    const refreshMs = () => {
      m.querySelector('#msContainer').innerHTML = renderMsHTML();
      m.querySelectorAll('.ms-del').forEach(btn => btn.onclick = () => { localMs.splice(+btn.dataset.mi,1); refreshMs(); });
      m.querySelectorAll('.ms-text-input').forEach(inp => inp.oninput = () => { localMs[+inp.dataset.mi].text = inp.value; });
    };
    refreshMs();
    m.querySelector('#addMsBtn').onclick = () => { localMs.push({id:uid(),text:'',done:false}); refreshMs(); };
    $('#goalForm', m).onsubmit = e => {
      e.preventDefault();
      const data = {
        title: $('#gTitle').value.trim(),
        desc: $('#gDesc').value.trim(),
        category: $('#gCat').value,
        deadline: $('#gDeadline').value,
        progress: +$('#gProg').value,
        milestones: localMs.filter(ms => ms.text.trim()),
      };
      if (id) Object.assign(g, data);
      else state.goals.push({ id: uid(), ...data });
      saveState(); closeModal(); renderObjetivos(); toast(id?'Atualizada':'Criada');
    };
  });
}

          <div class="item-meta">
            ${p.timeline ? `<span>📅 ${escapeHtml(p.timeline)}</span>` : ''}
            ${p.status ? `<span class="badge">${escapeHtml(p.status)}</span>` : ''}
          </div>
          ${p.steps ? `<div style="margin-top:8px;color:var(--text-dim);font-size:0.88rem;white-space:pre-wrap">${escapeHtml(p.steps)}</div>` : ''}
        </div>
        <div class="item-actions">
          <button class="icon-btn" data-plan-edit="${p.id}">✏️</button>
          <button class="icon-btn danger" data-plan-del="${p.id}">🗑️</button>
        </div>
      </div>`).join('');
    $$('[data-plan-edit]', planRoot).forEach(el => el.onclick = () => planModal(el.dataset.planEdit));
    $$('[data-plan-del]',  planRoot).forEach(el => el.onclick = () => {
      if (!confirmDialog('Excluir projeto?')) return;
      state.planning = state.planning.filter(x => x.id !== el.dataset.planDel);
      saveState(); renderFocus();
    });
  }

  /* --- Demandas (DDD) — agrupadas por urgência --- */
  $('#addDemBtn').onclick = () => demandModal();
  const demRoot = $('#demList');
  const allDemands = state.demands;

  const demItemHtml = d => `
    <div class="item prio-${d.urgency||'high'} ${d.done?'done':''}">
      <div class="item-checkbox ${d.done?'checked':''}" data-toggle="${d.id}"></div>
      <div class="item-body">
        <div class="item-title">${escapeHtml(d.title)}</div>
        ${d.context ? `<div class="item-meta"><span style="color:var(--text-faint)">${escapeHtml(d.context)}</span></div>` : ''}
      </div>
      <div class="item-actions">
        <button class="icon-btn" data-dem-edit="${d.id}">✏️</button>
        <button class="icon-btn danger" data-dem-del="${d.id}">🗑️</button>
      </div>
    </div>`;

  const dddGroup = (label, color, items) => items.length === 0 ? '' : `
    <div class="ddd-group-hdr" style="border-left:3px solid ${color}">
      <span>${label}</span><span class="pantry-count">${items.length}</span>
    </div>
    ${items.map(demItemHtml).join('')}`;

  if (!allDemands.length) {
    demRoot.innerHTML = `<div class="empty" style="padding:20px 0"><div class="empty-icon">⚡</div><p style="margin:0">Nenhuma demanda ainda</p></div>`;
  } else {
    const high = allDemands.filter(d => !d.done && d.urgency === 'high');
    const med  = allDemands.filter(d => !d.done && d.urgency === 'med');
    const low  = allDemands.filter(d => !d.done && (d.urgency === 'low' || !d.urgency));
    const done = allDemands.filter(d =>  d.done);

    demRoot.innerHTML =
      dddGroup('🔴 Tem que fazer', 'var(--danger)',  high) +
      dddGroup('🟡 Preciso fazer', 'var(--warning)', med)  +
      dddGroup('🟢 Quero fazer',   'var(--success)', low)  +
      (done.length ? `
        <div class="ddd-group-hdr" style="border-left:3px solid var(--border);margin-top:8px">
          <span>✓ Concluídas</span><span class="pantry-count">${done.length}</span>
        </div>
        ${done.map(demItemHtml).join('')}` : '');

    $$('[data-toggle]', demRoot).forEach(el => el.onclick = () => {
      const d = state.demands.find(x => x.id === el.dataset.toggle);
      d.done = !d.done; saveState(); renderFocus();
    });
    $$('[data-dem-edit]', demRoot).forEach(el => el.onclick = () => demandModal(el.dataset.demEdit));
    $$('[data-dem-del]',  demRoot).forEach(el => el.onclick = () => {
      if (!confirmDialog('Excluir demanda?')) return;
      state.demands = state.demands.filter(x => x.id !== el.dataset.demDel);
      saveState(); renderFocus();
    });
  }
}

/* =========================================================
   DDD — Depósito de Demandas (página dedicada)
   ========================================================= */
function renderDDD() {
  $('#main').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Depósito de Demandas</div>
        <div class="page-subtitle">Tudo que precisa sair da cabeça vai pra cá.</div>
      </div>
    </div>
    <div class="ddd-kanban" id="dddKanban"></div>
  `;

  const renderKanban = () => {
    const all    = state.demands;
    const todo   = all.filter(d => !d.done && d.urgency === 'low');
    const temque = all.filter(d => !d.done && (d.urgency === 'high' || d.urgency === 'med' || !d.urgency));

    const itemHtml = (d, fromCol) => `
      <div class="kanban-item">
        <span class="kanban-drag-handle">⠿</span>
        <span class="kanban-item-text">${escapeHtml(d.title)}</span>
        <div class="kanban-item-actions">
          <button class="kanban-action-btn" data-ktr="${d.id}" data-from="${fromCol}" title="Mover coluna">⇄</button>
          <button class="kanban-action-btn kdanger" data-kdel="${d.id}" title="Excluir">✕</button>
        </div>
      </div>`;

    const colHtml = (meta, title, items, col) => `
      <div class="kanban-col">
        <div class="kanban-col-hdr">
          <div>
            <div class="kanban-col-meta">${meta}</div>
            <div class="kanban-col-title">${title}</div>
          </div>
          <div class="kanban-col-badge">${items.length}</div>
        </div>
        <div class="kanban-quick-add">
          <input class="kanban-quick-input" placeholder='Adicionar em "${title}"...' data-col="${col}" />
          <button class="kanban-add-btn" data-addcol="${col}">+</button>
        </div>
        <div class="kanban-items">
          ${items.length ? items.map(d => itemHtml(d, col)).join('') : '<div class="kanban-empty">Nenhuma demanda aqui</div>'}
        </div>
      </div>`;

    $('#dddKanban').innerHTML =
      colHtml('QUERO FAZER', 'To-do',    todo,   'todo') +
      colHtml('PRECISO FAZER', 'Tem que', temque, 'temque');

    $$('.kanban-add-btn').forEach(btn => {
      const col   = btn.dataset.addcol;
      const input = btn.previousElementSibling;
      const add   = () => {
        const title = input.value.trim();
        if (!title) return;
        state.demands.push({ id: uid(), title, urgency: col === 'todo' ? 'low' : 'high', done: false, context: '' });
        saveState(); renderKanban(); toast('Demanda adicionada');
      };
      btn.onclick = add;
      input.onkeydown = e => { if (e.key === 'Enter') add(); };
    });

    $$('[data-ktr]').forEach(btn => btn.onclick = () => {
      const d = state.demands.find(x => x.id === btn.dataset.ktr);
      if (!d) return;
      d.urgency = btn.dataset.from === 'todo' ? 'high' : 'low';
      saveState(); renderKanban();
    });

    $$('[data-kdel]').forEach(btn => btn.onclick = () => {
      if (!confirmDialog('Excluir demanda?')) return;
      state.demands = state.demands.filter(x => x.id !== btn.dataset.kdel);
      saveState(); renderKanban();
    });
  };

  renderKanban();
}

let _routineWeekOffset = 0; // 0 = current week, -1 = previous, etc.

function getWeekDates(offsetWeeks) {
  const now = new Date();
  const dayOfWeek = now.getDay(); // 0=Sun
  // Make week start on Monday (index 1); adjust so week starts Mon
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((dayOfWeek + 6) % 7) + offsetWeeks * 7);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}
