function renderHabitHeatmap() {
  const main = document.getElementById('main');
  if (!main || !state.routine.length) return;

  const WEEKS = 52;
  const now = new Date();
  // Start from Sunday 52 weeks ago
  const startDate = new Date(now);
  startDate.setDate(startDate.getDate() - startDate.getDay() - (WEEKS - 1) * 7);

  // Build weekly columns
  const monthLabels = [];
  let prevMonth = -1;
  const cols = [];

  for (let w = 0; w < WEEKS; w++) {
    const colCells = [];
    for (let d = 0; d < 7; d++) {
      const dt = new Date(startDate);
      dt.setDate(dt.getDate() + w * 7 + d);
      if (dt > now) { colCells.push(null); continue; }
      const ds = dt.toISOString().slice(0, 10);
      const dayIdx = dt.getDay();
      const scheduled = state.routine.filter(r => !r.days || r.days.includes(dayIdx));
      const done = scheduled.filter(r => habitState(r, ds) === 'done').length;
      const total = scheduled.length;
      let lv = 0;
      if (total > 0) {
        const ratio = done / total;
        if (ratio > 0)     lv = 1;
        if (ratio >= 0.5)  lv = 2;
        if (ratio >= 0.75) lv = 3;
        if (ratio === 1)   lv = 4;
      }
      colCells.push({ ds, lv, done, total, dt });
    }
    cols.push(colCells);
    // Month label on first day of new month
    const firstReal = colCells.find(c => c);
    if (firstReal && firstReal.dt.getMonth() !== prevMonth) {
      prevMonth = firstReal.dt.getMonth();
      monthLabels.push({ w, label: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][prevMonth] });
    }
  }

  // Build month label row (fixed width per week column = 14px: 11px + 3px gap)
  const CELL_W = 14;
  let monthHTML = '<div class="heatmap-month-labels" style="padding-left:0">';
  let lastW = 0;
  monthLabels.forEach(ml => {
    const spacer = (ml.w - lastW) * CELL_W;
    monthHTML += `<div class="heatmap-month-label" style="min-width:${spacer}px">${ml.label}</div>`;
    lastW = ml.w;
  });
  monthHTML += '</div>';

  let gridHTML = '<div class="heatmap-grid">';
  cols.forEach(col => {
    gridHTML += '<div class="heatmap-col">';
    col.forEach(cell => {
      if (!cell) { gridHTML += '<div class="heatmap-cell" style="visibility:hidden"></div>'; return; }
      const tip = `${cell.ds}: ${cell.done}/${cell.total} hábitos`;
      gridHTML += `<div class="heatmap-cell lv${cell.lv}" title="${tip}"></div>`;
    });
    gridHTML += '</div>';
  });
  gridHTML += '</div>';

  const legendHTML = `<div class="heatmap-legend">
    Menos
    <div class="heatmap-legend-cell" style="background:var(--panel-2)"></div>
    <div class="heatmap-legend-cell lv1 heatmap-cell"></div>
    <div class="heatmap-legend-cell lv2 heatmap-cell"></div>
    <div class="heatmap-legend-cell lv3 heatmap-cell"></div>
    <div class="heatmap-legend-cell lv4 heatmap-cell"></div>
    Mais
  </div>`;

  const wrap = document.createElement('div');
  wrap.className = 'heatmap-wrap';
  wrap.innerHTML = `<div class="heatmap-title"><span>Histórico Anual de Hábitos</span><span style="font-weight:400;font-size:0.75rem">${WEEKS} semanas</span></div>${monthHTML}${gridHTML}${legendHTML}`;
  main.appendChild(wrap);
}

        state.notes = state.notes.filter(x => x.id !== el.dataset.del);

  } else if (active === 'reminders') {
    if (!state.reminders.length) {
      body.innerHTML = `<div class="empty"><div class="empty-icon">📌</div><h3>Sem lembretes</h3><p>Adicione um post-it rápido</p></div>`;

      $$('[data-del]', body).forEach(el => el.onclick = () => {
        state.reminders = state.reminders.filter(x => x.id !== el.dataset.del);
        saveState(); renderNotesReminders();
      });
    }

  } else {
    /* ---- GALERIA ---- */
    if (!(state.gallery||[]).length) {
      body.innerHTML = `<div class="empty"><div class="empty-icon">🖼️</div><h3>Sem imagens</h3><p>Adicione imagens à sua galeria</p></div>`;
    } else {
      body.innerHTML = `<div class="gallery-grid" id="nrGalGrid">
        ${state.gallery.map(img => `
          <div class="gallery-item">
            <img src="${img.data}" alt="${escapeHtml(img.name||'')}" data-view="${img.id}" />
            <button class="icon-btn gallery-del danger" data-del="${img.id}">🗑️</button>
          </div>`).join('')}

      $$('[data-view]', body).forEach(el => el.onclick = () => {

        if (img) openModal(`<img src="${img.data}" style="max-width:100%;max-height:80vh;border-radius:10px" />`);
      });
      $$('[data-del]', body).forEach(el => el.onclick = e => {
        e.stopPropagation();
        if (!confirmDialog('Excluir imagem?')) return;
        state.gallery = state.gallery.filter(x => x.id !== el.dataset.del);
        saveState(); renderNotesReminders();
      });
    }
  }
}

/* =========================================================
   DESPENSA & BAÚ — página unificada com abas internas
   ========================================================= */
let _pantryTab = 'despensa';

function renderPantry(tab) {
  if (tab) _pantryTab = tab;
  const active = _pantryTab;

  const now   = new Date();
  const today = now.toISOString().slice(0,10);

  /* ---- contadores para badges das abas ---- */
  const pending = state.tasks.filter(t => !t.done);
  const vault   = (state.vault || []);

  $('#main').innerHTML = `
    <div class="page-header" style="margin-bottom:0;padding-bottom:0;border-bottom:none">
      <div>
        <div class="page-title">🏆 Baú & Despensa</div>
      </div>
    </div>

    <div class="inner-tabs">
      <button class="inner-tab ${active==='despensa'?'active':''}" data-ptab="despensa">
        📥 Despensa <span class="inner-tab-count">${pending.length}</span>
      </button>
      <button class="inner-tab ${active==='vault'?'active':''}" data-ptab="vault">
        📦 Baú <span class="inner-tab-count">${vault.length}</span>
      </button>
    </div>

    <div id="pantryBody"></div>
  `;

  /* Troca de aba */
  $$('[data-ptab]').forEach(btn => btn.onclick = () => {
    _pantryTab = btn.dataset.ptab;
    renderPantry();
  });

  const body = $('#pantryBody');

  /* ===================== ABA DESPENSA ===================== */
  if (active === 'despensa') {
    const dayOfWeek = now.getDay();
    const weekStart = new Date(now); weekStart.setDate(now.getDate() - dayOfWeek);
    const weekKey   = weekStart.toISOString().slice(0,10);
    const monthKey  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;

    const sorted = pending.sort((a,b) => (a.date||'').localeCompare(b.date||'') || (a.time||'').localeCompare(b.time||''));

    const grpToday  = sorted.filter(t => t.date === today);
    const grpWeek   = sorted.filter(t => t.date && t.date >= weekKey && t.date < today);
    const grpMonth  = sorted.filter(t => t.date && t.date >= monthKey && t.date < weekKey);
    const grpOld    = sorted.filter(t => t.date && t.date < monthKey);
    const grpNoDate = sorted.filter(t => !t.date);

    const countOverdue = grpOld.length + grpMonth.length + grpWeek.length;
    const countToday   = grpToday.length;
    const countNoDate  = grpNoDate.length;

    const itemHtml = (t, period) => `
      <div class="item prio-${t.priority||'med'}">
        <div class="item-checkbox" data-done="${t.id}"></div>
        <div class="item-body">
          <div class="item-title">${escapeHtml(t.title)}</div>
          <div class="item-meta">
            ${t.date ? `<span>${new Date(t.date+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'})}</span>` : ''}
            ${t.time ? `<span>⏰ ${t.time}</span>` : ''}
            <span class="badge ${t.priority||'med'}">${({high:'Alta',med:'Média',low:'Baixa'})[t.priority||'med']}</span>
          </div>
        </div>
        <div class="item-actions">
          ${period === 'past' ? `<button class="btn btn-sm btn-ghost" data-reschedule="${t.id}">Hoje</button>` : ''}
          <button class="icon-btn danger" data-del="${t.id}">🗑️</button>
        </div>
      </div>`;

    const groupHtml = (label, cls, items, period) => items.length === 0 ? '' : `
      <div class="pantry-group">
        <div class="pantry-group-hdr ${cls}">
          <span>${label}</span><span class="pantry-count">${items.length}</span>
        </div>
        ${items.map(t => itemHtml(t, period)).join('')}
      </div>`;

    if (sorted.length === 0) {
      body.innerHTML = `
        <div class="pantry-stats">
          <div class="pantry-stat overdue"><div class="pantry-stat-num">0</div><div class="pantry-stat-lbl">Atrasadas</div></div>
          <div class="pantry-stat todaystat"><div class="pantry-stat-num">0</div><div class="pantry-stat-lbl">Hoje</div></div>
          <div class="pantry-stat futurestat"><div class="pantry-stat-num">0</div><div class="pantry-stat-lbl">Sem data</div></div>
        </div>
        <div class="pantry-empty"><div style="font-size:2.5rem;margin-bottom:10px">🎉</div><h3>Tudo em dia!</h3><p>Nenhuma tarefa pendente.</p></div>`;
    } else {
      body.innerHTML = `
        <div class="pantry-stats">
          <div class="pantry-stat overdue"><div class="pantry-stat-num">${countOverdue}</div><div class="pantry-stat-lbl">Atrasadas</div></div>
          <div class="pantry-stat todaystat"><div class="pantry-stat-num">${countToday}</div><div class="pantry-stat-lbl">Hoje</div></div>
          <div class="pantry-stat futurestat"><div class="pantry-stat-num">${countNoDate}</div><div class="pantry-stat-lbl">Sem data</div></div>
        </div>
        ${groupHtml('📅 Hoje',        'today',   grpToday,  'today')}
        ${groupHtml('📆 Esta semana', 'overdue', grpWeek,   'past')}
        ${groupHtml('🗓️ Este mês',    'overdue', grpMonth,  'past')}
        ${groupHtml('⚠️ Mais antigas','overdue', grpOld,    'past')}
        ${groupHtml('📌 Sem data',    'nodate',  grpNoDate, 'nodate')}`;

      $$('[data-done]', body).forEach(el => el.onclick = () => {
        const t = state.tasks.find(x => x.id === el.dataset.done);
        if (!t) return;
        t.done = true; addToVault('task', t); saveState(); renderPantry(); toast('Tarefa concluída ✓');
      });
      $$('[data-reschedule]', body).forEach(el => el.onclick = () => {
        const t = state.tasks.find(x => x.id === el.dataset.reschedule);
        if (!t) return;
        t.date = today; saveState(); renderPantry(); toast('Reagendada para hoje 📅');
      });
      $$('[data-del]', body).forEach(el => el.onclick = () => {
        if (!confirmDialog('Excluir tarefa?')) return;
        state.tasks = state.tasks.filter(x => x.id !== el.dataset.del);
        saveState(); renderPantry(); toast('Tarefa excluída');
      });
    }

  /* ===================== ABA BAÚ ===================== */
  } else {
    const fmtDate = iso => new Date(iso).toLocaleDateString('pt-BR', { day:'numeric', month:'short', year:'numeric' });
    const typeIcon = { task: '✓', goal: '🎯', minigoal: '⭐' };
    const typeLabel = { task: 'Tarefa', goal: 'Meta', minigoal: 'Mini Meta' };

    const renderBau = (query, filterType, sortBy) => {
      let items = [...vault];
      if (query)      items = items.filter(v => v.title.toLowerCase().includes(query.toLowerCase()));
      if (filterType && filterType !== 'all') items = items.filter(v => v.type === filterType);
      if (sortBy === 'alpha') items.sort((a,b) => a.title.localeCompare(b.title));
      else items.sort((a,b) => new Date(b.completedAt) - new Date(a.completedAt));

      const list = $('#bauList');
      if (!list) return;
      if (!items.length) {
        list.innerHTML = `<div style="text-align:center;padding:48px 20px;color:var(--text-faint)">
          <div style="font-size:2.5rem;margin-bottom:10px">✨</div>
          <div style="font-size:1rem;font-weight:600;color:var(--text)">${vault.length === 0 ? 'O baú está vazio.' : 'Nenhum item encontrado.'}</div>
          <div style="font-size:0.88rem;margin-top:6px">${vault.length === 0 ? 'Comece a concluir tarefas!' : 'Tente outro filtro.'}</div>
        </div>`;
        return;
      }
      list.innerHTML = items.map(v => `
        <div class="bau-item">
          <div class="bau-item-icon">${typeIcon[v.type] || '✓'}</div>
          <div class="bau-item-body">
            <div class="bau-item-title">${escapeHtml(v.title)}</div>
            <div class="bau-item-meta">${typeLabel[v.type] || 'Item'} · ${fmtDate(v.completedAt)}</div>
          </div>
          <button class="icon-btn danger" data-vault-del="${v.id}" title="Remover">🗑️</button>
        </div>`).join('');

      $$('[data-vault-del]', list).forEach(el => el.onclick = () => {
        if (!confirmDialog('Remover do Baú?')) return;
        state.vault = state.vault.filter(v => v.id !== el.dataset.vaultDel);
        saveState(); renderPantry();
      });
    };

    body.innerHTML = `
      <div style="margin-bottom:6px;font-size:0.85rem;color:var(--text-dim)">${vault.length} tarefa${vault.length!==1?'s':''} concluída${vault.length!==1?'s':''}.</div>
      <div class="bau-search-bar">
        <div class="bau-search-wrap">
          <span class="bau-search-icon">🔍</span>
          <input class="bau-search-input" id="bauQ" placeholder="Buscar..." />
        </div>
        <select class="bau-filter-select" id="bauType">
          <option value="all">Todas</option>
          <option value="task">Tarefas</option>
          <option value="goal">Metas</option>
          <option value="minigoal">Mini Metas</option>
        </select>
        <select class="bau-filter-select" id="bauSort">
          <option value="recent">Mais recentes</option>
          <option value="alpha">A–Z</option>
        </select>
      </div>
      <div id="bauList"></div>
    `;

    const update = () => renderBau($('#bauQ').value, $('#bauType').value, $('#bauSort').value);
    $('#bauQ').oninput = update;
    $('#bauType').onchange = update;
    $('#bauSort').onchange = update;
    update();
  }
}

   INVENTÁRIO (Pantry / Storage)

function renderInventory(key, title, subtitle) {
  const items = state[key];

  $('#main').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">${title}</div>
        <div class="page-subtitle">${subtitle}</div>
      </div>
      <button class="btn btn-primary" id="addInvBtn">+ Novo Item</button>
    </div>
    <div class="inv-table" id="invTable"></div>
  `;

  $('#addInvBtn').onclick = () => invModal(key);

  const root = $('#invTable');
  if (!items.length) {
    root.innerHTML = `<div class="inv-empty"><div style="font-size:3rem;margin-bottom:10px">${key==='pantry'?'🥫':'📦'}</div><h3>Sem itens</h3></div>`;
    return;
  }

  root.innerHTML = `
    <div class="inv-row head">
      <div>Nome</div>
      <div>Quantidade</div>
      <div>Mínimo</div>
      <div></div>
    </div>
    ${items.map(i => `
      <div class="inv-row" data-id="${i.id}">
        <div><input value="${escapeHtml(i.name)}" data-field="name" data-id="${i.id}"/></div>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" value="${i.qty}" data-field="qty" data-id="${i.id}" class="${i.qty <= i.min ? 'inv-low' : ''}" style="width:60px"/>
          <span style="color:var(--text-faint);font-size:0.85rem">${escapeHtml(i.unit||'')}</span>
        </div>
        <div><input type="number" value="${i.min||0}" data-field="min" data-id="${i.id}" style="width:60px"/></div>
        <div><button class="icon-btn danger" data-del="${i.id}">🗑️</button></div>
      </div>
    `).join('')}
  `;

  $$('input[data-field]', root).forEach(el => el.onchange = () => {
    const item = state[key].find(x => x.id === el.dataset.id);
    const v = el.type === 'number' ? +el.value : el.value;
    item[el.dataset.field] = v;
    saveState(); renderInventory(key, title, subtitle);
  });
  $$('[data-del]', root).forEach(el => el.onclick = () => {
    if (!confirmDialog('Remover item?')) return;
    state[key] = state[key].filter(x => x.id !== el.dataset.del);
    saveState(); renderInventory(key, title, subtitle);
  });
}

  openModal(`

        <div class="field"><label>Unidade</label><input id="iUnit" placeholder="kg, un, pacote..."/></div>

        <button type="submit" class="btn btn-primary">Adicionar</button>
      </div>
    </form>
  `, m => {
    $('#invForm', m).onsubmit = e => {
      e.preventDefault();
      state[key].push({

        <div class="card-title">Acesso em Outros Dispositivos</div>
        <div style="margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px">

          <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px">
            <div style="font-weight:700;font-size:0.88rem;margin-bottom:6px">📱 Opção 1 — Netlify Drop <span style="color:var(--success);font-size:0.75rem;font-weight:600">Grátis</span></div>
            <div style="font-size:0.82rem;color:var(--text-dim);line-height:1.6">
              1. Acesse <strong style="color:var(--accent-2)">app.netlify.com/drop</strong><br>
              2. Arraste o arquivo <code>rotina.html</code><br>
              3. Receba um link <strong>HTTPS</strong> público<br>
              4. Abra no Android / Tablet / qualquer browser
            </div>
            <button class="btn btn-ghost" style="margin-top:10px;width:100%;font-size:0.82rem"
              onclick="window.open('https://app.netlify.com/drop','_blank')">
              Abrir Netlify Drop →
            </button>
          </div>

          <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px">
            <div style="font-weight:700;font-size:0.88rem;margin-bottom:6px">💻 Opção 2 — Rede Local (Wi-Fi)</div>
            <div style="font-size:0.82rem;color:var(--text-dim);line-height:1.6">
              No computador, abra o terminal e rode:<br>
              <code style="display:block;background:var(--bg-3);padding:8px 10px;border-radius:8px;margin:8px 0;font-size:0.78rem;word-break:break-all">npx serve -s . -p 3000</code>
              Acesse no celular: <strong style="color:var(--accent-2)" id="localIpHint">http://&lt;IP-do-PC&gt;:3000</strong>
            </div>
            <button class="btn btn-ghost" style="margin-top:10px;width:100%;font-size:0.82rem" id="copyServeCmd">
              Copiar comando
            </button>
          </div>

          <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px">
            <div style="font-weight:700;font-size:0.88rem;margin-bottom:6px">🔗 Opção 3 — GitHub Pages <span style="color:var(--success);font-size:0.75rem;font-weight:600">Grátis</span></div>
            <div style="font-size:0.82rem;color:var(--text-dim);line-height:1.6">
              1. Crie um repositório no GitHub<br>
              2. Faça upload do <code>rotina.html</code> como <code>index.html</code><br>
              3. Ative <strong>GitHub Pages</strong> nas configurações<br>
              4. Link permanente + instalável como PWA
            </div>
            <button class="btn btn-ghost" style="margin-top:10px;width:100%;font-size:0.82rem"
              onclick="window.open('https://github.com/new','_blank')">
              Abrir GitHub →
            </button>
          </div>
        </div>
      </div>

    </div>
  `;

  $('#sTheme').onchange = e => { state.settings.theme = e.target.value; saveState(); applyTheme(); };
  $('#sFont').onchange = e => { state.settings.font = e.target.value; saveState(); applyTheme(); };
  $$('[data-set-accent]').forEach(sw => sw.onclick = () => {
    state.settings.accent = sw.dataset.setAccent;
    saveState(); applyTheme();
    $$('[data-set-accent]').forEach(x => x.classList.toggle('active', x === sw));
  });

  $('#reqNotif').onclick = async () => {
    if (!('Notification' in window)) { toast('Não suportado'); return; }
    const p = await window.Notification.requestPermission();
    $('#notifStatus').textContent = p;
    toast('Permissão: ' + p);
  };

  $('#exportBtn').onclick = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `zen-life-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Exportado');
  };

  $('#importBtn').onclick = () => $('#importInput').click();
  $('#importInput').onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        state = { ...defaultState, ...data, settings: { ...defaultState.settings, ...(data.settings||{}) }};
        saveState(); applyTheme(); navigate('dashboard'); toast('Importado');
      } catch { toast('Arquivo inválido'); }
    };
    r.readAsText(f);
  };

  $('#resetBtn').onclick = () => {
    if (!confirmDialog('Apagar TODOS os dados? Esta ação é irreversível.')) return;
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  };

  const copyBtn = document.getElementById('copyServeCmd');
  if (copyBtn) copyBtn.onclick = () => {
    navigator.clipboard?.writeText('npx serve -s . -p 3000').then(() => toast('Comando copiado!'));
  };
}

/* =========================================================

  const counts = {
    tasks: state.tasks.length,
    goals: state.goals.length,
    planning: state.planning.length,
    demands: state.demands.length,
    routine: state.routine.length,
    notes: state.notes.length,

  $('#main').innerHTML = `
    <div class="page-header">

      <div class="diag-card">
        <div class="card-title">Notificações</div>

      <div class="diag-card">
        <div class="card-title">Wake Lock API</div>
        <div class="diag-status ${'wakeLock' in navigator?'ok':'err'}">${'wakeLock' in navigator?'Disponível':'Não suportado'}</div>

      <div class="diag-card">
        <div class="card-title">Vibration API</div>
        <div class="diag-status ${navigator.vibrate?'ok':'err'}">${navigator.vibrate?'Disponível':'Não suportado'}</div>

      <div class="diag-card">
        <div class="card-title">Service Worker</div>
        <div class="diag-status ${'serviceWorker' in navigator?'ok':'err'}">${'serviceWorker' in navigator?'Suportado':'N/D'}</div>
      </div>
    </div>

    <div class="card" style="margin-top:20px">
      <div class="card-title">Estatísticas de Dados</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));gap:8px;margin-top:10px">
        ${Object.entries(counts).map(([k,v]) => `
          <div style="padding:10px;background:var(--panel-2);border-radius:8px;text-align:center">
            <div style="font-size:1.4rem;font-weight:700;color:var(--accent-2)">${v}</div>
            <div style="font-size:0.78rem;color:var(--text-dim);text-transform:capitalize">${k}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="card-title">Informações Técnicas</div>
      <div style="font-family:var(--font-mono);font-size:0.82rem;color:var(--text-dim);margin-top:10px;line-height:1.7">
        <div>User Agent: ${navigator.userAgent.slice(0, 80)}...</div>
        <div>Idioma: ${navigator.language}</div>
        <div>Plataforma: ${navigator.platform}</div>
        <div>Online: ${navigator.onLine ? 'Sim' : 'Não'}</div>

/* =========================================================
   ANÁLISE DE DADOS (ANALYTICS DASHBOARD)
   ========================================================= */
function renderAnalytics() {
  const today = new Date().toISOString().slice(0, 10);

  /* --- KPIs --- */
  const todayTasks  = state.tasks.filter(t => t.date === today);
  const doneTasks   = todayTasks.filter(t => t.done).length;
  const taskPct     = todayTasks.length ? Math.round(doneTasks / todayTasks.length * 100) : 0;
  const totalTasks  = state.tasks.length;
  const totalDone   = state.tasks.filter(t => t.done).length;
  const overallPct  = totalTasks ? Math.round(totalDone / totalTasks * 100) : 0;
  const activeGoals = state.goals.length;
  const avgGoalPct  = activeGoals
    ? Math.round(state.goals.reduce((s, g) => s + (g.progress || 0), 0) / activeGoals)
    : 0;
  const habitsDoneToday = state.routine.filter(r => r.done?.[today]).length;
  const totalHabits     = state.routine.length;
  const habitPct        = totalHabits ? Math.round(habitsDoneToday / totalHabits * 100) : 0;
  const pomoToday  = state.pomoStats.today  || 0;
  const pomoTotal  = state.pomoStats.total  || 0;

  /* --- Weekly habit adherence (last 7 days) --- */
  const anaLast7 = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - i);
    return d.toISOString().slice(0,10);
  });
  const anaWeekPcts = anaLast7.map(date => {
    const di = new Date(date + 'T12:00:00').getDay();
    const sched = state.routine.filter(r => !r.days || r.days.includes(di));
    if (!sched.length) return null;
    return sched.filter(r => habitState(r, date) === 'done').length / sched.length * 100;
  }).filter(v => v !== null);
  const anaWeeklyAdherence = anaWeekPcts.length
    ? Math.round(anaWeekPcts.reduce((a,b) => a+b, 0) / anaWeekPcts.length) : 0;
  const anaStreak = calcHabitStreak();
  const anaTotalCheckIns = calcTotalCheckIns();
  const anaLongestStreak = calcLongestEverStreak();

  /* --- 7-day dates --- */
  const last7 = Array.from({ length: 7 }, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - (6 - i));
    return d.toISOString().slice(0, 10);
  });

  /* --- Bar chart (tasks per day) --- */
  const chartData = last7.map(date => {
    const dayT = state.tasks.filter(t => t.date === date);
    return { date, total: dayT.length, done: dayT.filter(t => t.done).length };
  });
  const cW = 400, cH = 170, pad = 22, padB = 28;
  const innerH = cH - padB;
  const maxVal = Math.max(...chartData.map(d => d.total), 1);
  const slot   = (cW - pad * 2) / 7;
  const bW     = Math.max(slot - 10, 8);

  let barsHTML = '';
  chartData.forEach((d, i) => {
    const x      = pad + i * slot + (slot - bW) / 2;
    const tH     = Math.max((d.total / maxVal) * innerH, d.total > 0 ? 3 : 0);
    const dH     = Math.max((d.done  / maxVal) * innerH, d.done  > 0 ? 3 : 0);
    const isToday = d.date === today;
    const dayLabel = DAYS[new Date(d.date + 'T00:00:00').getDay()];
    barsHTML += `
      <rect x="${x.toFixed(1)}" y="${(innerH - tH).toFixed(1)}" width="${bW.toFixed(1)}" height="${tH.toFixed(1)}" rx="4"
        fill="${isToday ? 'rgba(124,77,255,0.22)' : 'rgba(255,255,255,0.04)'}" />
      ${d.done > 0 ? `<rect x="${x.toFixed(1)}" y="${(innerH - dH).toFixed(1)}" width="${bW.toFixed(1)}" height="${dH.toFixed(1)}" rx="4" fill="url(#anaGrad)" />` : ''}
      ${d.total > 0 ? `<text x="${(x + bW / 2).toFixed(1)}" y="${(innerH - tH - 5).toFixed(1)}" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.45)">${d.done}/${d.total}</text>` : ''}
      <text x="${(x + bW / 2).toFixed(1)}" y="${(cH - 7).toFixed(1)}" text-anchor="middle" font-size="10"
        fill="${isToday ? '#b388ff' : 'rgba(255,255,255,0.3)'}">${dayLabel}</text>
    `;
  });

  const barChart = `
    <svg width="100%" viewBox="0 0 ${cW} ${cH}" style="display:block">
      <defs>
        <linearGradient id="anaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stop-color="#7c4dff"/>
          <stop offset="100%" stop-color="#00e5ff"/>
        </linearGradient>
      </defs>
      <line x1="${pad}" y1="0" x2="${pad}" y2="${innerH}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <line x1="${pad}" y1="${innerH}" x2="${cW - pad}" y2="${innerH}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      ${barsHTML}
    </svg>`;

  /* --- Habit streak dots (3-color: done=green, failed=red, neutral=gray) --- */
  const habitHTML = state.routine.length
    ? state.routine.map(r => {
        const dots = last7.map(date => {
          const hs = habitState(r, date);
          return `<div class="habit-dot ${hs}" title="${date}: ${hs}"></div>`;
        }).join('');
        const streak = calcHabitStreakFor(r);
        const meta = [r.time, r.local].filter(Boolean).join(' · ');
        return `
          <div class="habit-streak-item">
            <div style="display:flex;flex-direction:column;gap:1px;min-width:0;flex:1">
              <span class="habit-streak-name">${escapeHtml(r.title)}</span>
              ${meta ? `<span style="font-size:0.72rem;color:var(--text-faint)">${escapeHtml(meta)}</span>` : ''}
            </div>
            <div class="habit-dots">${dots}</div>
            <span class="habit-streak-badge ${streak===0?'zero':''}" style="font-size:0.72rem">🔥 ${streak}d</span>
          </div>`;
      }).join('')
    : '<div style="color:var(--text-faint);font-size:0.88rem;padding:12px 0">Sem hábitos configurados</div>';

  /* --- Goals list --- */
  const goalHTML = state.goals.length
    ? state.goals.map(g => `
        <div class="goal-analytics-item">
          <div class="goal-analytics-header">
            <span style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%">${escapeHtml(g.title)}</span>
            <span style="color:var(--accent-2);font-family:var(--font-mono);flex-shrink:0">${g.progress || 0}%</span>
          </div>
          <div class="goal-analytics-bar-wrap">
            <div class="goal-analytics-bar" style="width:${g.progress || 0}%"></div>
          </div>
          <div style="font-size:0.73rem;color:var(--text-faint)">
            ${escapeHtml(g.category || 'geral')}${g.deadline
              ? ' • ' + new Date(g.deadline + 'T00:00:00').toLocaleDateString('pt-BR')
              : ''}
          </div>
        </div>`)
      .join('')
    : '<div style="color:var(--text-faint);font-size:0.88rem;padding:12px 0">Nenhuma meta criada</div>';

  /* --- Inventory alerts --- */
  const allInv  = [...state.pantry, ...state.storage];
  const lowItems = allInv.filter(i => i.min > 0 && i.qty <= i.min);
  const invHTML = lowItems.length
    ? lowItems.map(i => `
        <div class="inv-alert-item">
          <span>${escapeHtml(i.name)}</span>
          <span>
            <strong style="color:var(--danger)">${i.qty} ${escapeHtml(i.unit || '')}</strong>
            <span style="color:var(--text-faint);margin-left:4px">(mín: ${i.min})</span>
          </span>
        </div>`).join('')
    : '<div style="color:var(--success);font-size:0.88rem;padding:12px 0">✓ Nenhum item crítico no estoque</div>';

  /* --- Demandas pendentes --- */
  const pendingDemands = state.demands.filter(d => !d.done);
  const urgentCount    = pendingDemands.filter(d => d.urgency === 'high').length;

  /* --- Render --- */
  $('#main').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Estatísticas</div>
        <div class="page-subtitle">Visão analítica consolidada do seu sistema •
          ${new Date().toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' })}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="navigate('dashboard')">← Início</button>
    </div>

    <div class="analytics-layout">

      <!-- ░░ PAINEL PRINCIPAL ░░ -->
      <div>
        <div class="analytics-section-title">Painel Principal</div>
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-value">${doneTasks}<span style="font-size:1rem;opacity:.5">/${todayTasks.length}</span></div>
            <div class="kpi-label">Tarefas Hoje</div>
            <div class="kpi-sub">${taskPct}% concluídas</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value">${overallPct}<span style="font-size:1rem;opacity:.5">%</span></div>
            <div class="kpi-label">Taxa Global</div>
            <div class="kpi-sub">${totalDone} de ${totalTasks} tarefas</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value">${avgGoalPct}<span style="font-size:1rem;opacity:.5">%</span></div>
            <div class="kpi-label">Progresso Médio</div>
            <div class="kpi-sub">${activeGoals} meta${activeGoals !== 1 ? 's' : ''} ativa${activeGoals !== 1 ? 's' : ''}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value">${habitsDoneToday}<span style="font-size:1rem;opacity:.5">/${totalHabits}</span></div>
            <div class="kpi-label">Hábitos Hoje</div>
            <div class="kpi-sub">${habitPct}% da rotina</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" style="color:${anaWeeklyAdherence>=70?'var(--success)':anaWeeklyAdherence>=40?'var(--warning)':'var(--danger)'}">${anaWeeklyAdherence}<span style="font-size:1rem;opacity:.5">%</span></div>
            <div class="kpi-label">Aderência Semanal</div>
            <div class="kpi-sub">últimos 7 dias</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" style="color:${anaStreak>0?'var(--success)':'inherit'}">${anaStreak}<span style="font-size:1rem;opacity:.5">d</span></div>
            <div class="kpi-label">Sequência Atual</div>
            <div class="kpi-sub">dias consecutivos</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value">${anaLongestStreak}<span style="font-size:1rem;opacity:.5">d</span></div>
            <div class="kpi-label">Maior Streak</div>
            <div class="kpi-sub">recorde histórico</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" style="color:${anaTotalCheckIns>0?'var(--accent-2)':'inherit'}">${anaTotalCheckIns}</div>
            <div class="kpi-label">Marcações Totais</div>
            <div class="kpi-sub">histórico completo</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value">${pomoToday}</div>
            <div class="kpi-label">Pomodoros Hoje</div>
            <div class="kpi-sub">${pomoTotal} sessões no total</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" style="color:${urgentCount > 0 ? 'var(--danger)' : 'inherit'}">${pendingDemands.length}</div>
            <div class="kpi-label">Demandas Abertas</div>
            <div class="kpi-sub">${urgentCount} urgente${urgentCount !== 1 ? 's' : ''}</div>
          </div>
        </div>
      </div>

      <!-- ░░ ATIVIDADE RECENTE ░░ -->
      <div>
        <div class="analytics-section-title">Atividade Recente</div>
        <div class="analytics-row">
          <div class="chart-card">
            <div class="chart-title">📈 Tarefas — Últimos 7 dias</div>
            <div class="chart-area">${barChart}</div>
            <div style="display:flex;gap:14px;margin-top:10px;font-size:0.75rem;color:var(--text-faint)">
              <span style="display:flex;align-items:center;gap:5px">
                <span style="width:10px;height:10px;border-radius:3px;background:linear-gradient(135deg,#7c4dff,#00e5ff);display:inline-block"></span>
                Concluídas
              </span>
              <span style="display:flex;align-items:center;gap:5px">
                <span style="width:10px;height:10px;border-radius:3px;background:rgba(255,255,255,0.08);display:inline-block"></span>
                Total
              </span>
            </div>
          </div>
          <div class="chart-card">
            <div class="chart-title">🔁 Hábitos — Sequência 7 dias</div>
            <div class="habit-streak-grid" style="max-height:200px;overflow-y:auto">${habitHTML}</div>
            ${state.routine.length ? `
              <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:0.82rem;color:var(--text-dim)">
                <span>Aderência semanal</span>
                <span style="color:var(--accent-2);font-weight:700">${anaWeeklyAdherence}%</span>
              </div>` : ''}
          </div>
        </div>
      </div>

      <!-- ░░ METAS & ESTOQUE ░░ -->
      <div>
        <div class="analytics-section-title">Metas & Estoque</div>
        <div class="analytics-row">
          <div class="chart-card">
            <div class="chart-title">🎯 Progresso das Metas</div>
            <div class="goal-analytics-list" style="max-height:280px;overflow-y:auto">${goalHTML}</div>
          </div>
          <div class="chart-card">
            <div class="chart-title">
              📦 Inventário Crítico
              ${lowItems.length ? `<span style="color:var(--danger);font-size:0.85em">(${lowItems.length})</span>` : ''}
            </div>
            <div class="inv-alert-list" style="max-height:280px;overflow-y:auto">${invHTML}</div>
            ${allInv.length ? `
              <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:0.8rem;color:var(--text-faint)">
                ${allInv.length} iten${allInv.length !== 1 ? 's' : ''} cadastrado${allInv.length !== 1 ? 's' : ''} •
                ${lowItems.length} abaixo do mínimo
              </div>` : ''}
          </div>
        </div>

function openSearchNav() {
  document.getElementById('searchNavBackdrop').classList.add('open');
  const inp = document.getElementById('searchNavInput');
  inp.value = '';
  _searchActiveIdx = -1;
  setTimeout(() => inp.focus(), 40);
  _renderSearchItems('');
}
function closeSearchNav() {
  document.getElementById('searchNavBackdrop').classList.remove('open');
}
function _renderSearchItems(q) {
  const query    = q.trim().toLowerCase();
  const filtered = query
    ? _searchItems.filter(i => i.label.toLowerCase().includes(query) || i.sub.toLowerCase().includes(query))
    : _searchItems;
  const list = document.getElementById('searchNavResults');
  if (!filtered.length) {
    list.innerHTML = `<div class="search-nav-empty">Nenhum resultado para "<strong>${escapeHtml(q)}</strong>"</div>`;
    return;
  }
  list.innerHTML = filtered.map((item, idx) => `
    <div class="search-nav-item" data-idx="${idx}">
      <div class="search-nav-item-icon">${item.icon}</div>
      <div style="min-width:0">
        <div class="search-nav-item-label">${escapeHtml(item.label)}</div>
        <div class="search-nav-item-sub">${escapeHtml(item.sub)}</div>
      </div>
      <span class="search-nav-arrow">↵</span>
    </div>`).join('');
  list.querySelectorAll('.search-nav-item').forEach((el, i) => {
    el.onclick = () => { closeSearchNav(); const it = filtered[i]; it.action ? it.action() : navigate(it.route); };
  });
}

let _statsDrawerTab = 'resumo';

function openStatsDrawer(tab) {
  if (tab) _statsDrawerTab = tab;
  document.getElementById('statsOverlay').classList.add('open');
  document.getElementById('statsDrawer').classList.add('open');
  renderStatsDrawer();
}

function closeStatsDrawer() {
  document.getElementById('statsOverlay').classList.remove('open');
  document.getElementById('statsDrawer').classList.remove('open');
}

function renderStatsDrawer(tab) {
  if (tab) _statsDrawerTab = tab;
  $$('.stats-drawer-itab').forEach(b => b.classList.toggle('active', b.dataset.stab === _statsDrawerTab));

  const body = document.getElementById('statsDrawerBody');
  const today = new Date().toISOString().slice(0, 10);

  /* ---- KPIs ---- */
  const todayTasks      = state.tasks.filter(t => t.date === today);
  const doneTasks       = todayTasks.filter(t => t.done).length;
  const taskPct         = todayTasks.length ? Math.round(doneTasks / todayTasks.length * 100) : 0;
  const totalTasks      = state.tasks.length;
  const totalDone       = state.tasks.filter(t => t.done).length;
  const overallPct      = totalTasks ? Math.round(totalDone / totalTasks * 100) : 0;
  const habitsDoneToday = state.routine.filter(r => r.done?.[today]).length;
  const totalHabits     = state.routine.length;
  const habitPct        = totalHabits ? Math.round(habitsDoneToday / totalHabits * 100) : 0;
  const pomoToday       = state.pomoStats.today || 0;
  const pomoTotal       = state.pomoStats.total || 0;
  const activeGoals     = state.goals.length;
  const avgGoalPct      = activeGoals
    ? Math.round(state.goals.reduce((s, g) => s + (g.progress || 0), 0) / activeGoals) : 0;
  const anaStreak       = calcHabitStreak();

  /* ---- Aderência semanal ---- */
  const last7 = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (6 - i));
    return d.toISOString().slice(0, 10);
  });
  const last7Rev = [...last7].reverse();
  const weekPcts = last7Rev.map(date => {
    const di = new Date(date + 'T12:00:00').getDay();
    const sched = state.routine.filter(r => !r.days || r.days.includes(di));
    if (!sched.length) return null;
    return sched.filter(r => habitState(r, date) === 'done').length / sched.length * 100;
  }).filter(v => v !== null);
  const weeklyAdherence = weekPcts.length
    ? Math.round(weekPcts.reduce((a, b) => a + b, 0) / weekPcts.length) : 0;

  /* ---- Tab: RESUMO ---- */
  if (_statsDrawerTab === 'resumo') {
    const cW = 360, cH = 140, pad = 18, padB = 24, innerH = cH - padB;
    const chartData = last7.map(date => {
      const dayT = state.tasks.filter(t => t.date === date);
      return { date, total: dayT.length, done: dayT.filter(t => t.done).length };
    });
    const maxVal = Math.max(...chartData.map(d => d.total), 1);
    const slot   = (cW - pad * 2) / 7;
    const bW     = Math.max(slot - 8, 8);
    let bars = '';
    chartData.forEach((d, i) => {
      const x  = pad + i * slot + (slot - bW) / 2;
      const tH = Math.max((d.total / maxVal) * innerH, d.total > 0 ? 3 : 0);
      const dH = Math.max((d.done  / maxVal) * innerH, d.done  > 0 ? 3 : 0);
      const isToday  = d.date === today;
      const dayLabel = DAYS[new Date(d.date + 'T00:00:00').getDay()];
      bars += `
        <rect x="${x.toFixed(1)}" y="${(innerH-tH).toFixed(1)}" width="${bW.toFixed(1)}" height="${tH.toFixed(1)}" rx="3"
          fill="${isToday ? 'rgba(124,77,255,0.22)' : 'rgba(255,255,255,0.04)'}" />
        ${d.done > 0 ? `<rect x="${x.toFixed(1)}" y="${(innerH-dH).toFixed(1)}" width="${bW.toFixed(1)}" height="${dH.toFixed(1)}" rx="3" fill="url(#sdGrad)" />` : ''}
        ${d.total > 0 ? `<text x="${(x+bW/2).toFixed(1)}" y="${(innerH-tH-4).toFixed(1)}" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.4)">${d.done}/${d.total}</text>` : ''}
        <text x="${(x+bW/2).toFixed(1)}" y="${(cH-6).toFixed(1)}" text-anchor="middle" font-size="9"
          fill="${isToday ? '#b388ff' : 'rgba(255,255,255,0.3)'}">${dayLabel}</text>`;
    });

    body.innerHTML = `
      <div class="stats-kpi-grid">
        <div class="stats-kpi-card">
          <div class="stats-kpi-val">${doneTasks}<span style="font-size:.9rem;opacity:.5">/${todayTasks.length}</span></div>
          <div class="stats-kpi-lbl">Tarefas Hoje</div>
          <div class="stats-kpi-sub">${taskPct}% concluídas</div>
        </div>
        <div class="stats-kpi-card">
          <div class="stats-kpi-val" style="color:${anaStreak>0?'var(--success)':'inherit'}">${anaStreak}<span style="font-size:.9rem;opacity:.5">d</span></div>
          <div class="stats-kpi-lbl">Sequência</div>
          <div class="stats-kpi-sub">dias consecutivos</div>
        </div>
        <div class="stats-kpi-card">
          <div class="stats-kpi-val">${habitsDoneToday}<span style="font-size:.9rem;opacity:.5">/${totalHabits}</span></div>
          <div class="stats-kpi-lbl">Hábitos Hoje</div>
          <div class="stats-kpi-sub">${habitPct}% da rotina</div>
        </div>
        <div class="stats-kpi-card">
          <div class="stats-kpi-val">${pomoToday}</div>
          <div class="stats-kpi-lbl">Pomodoros Hoje</div>
          <div class="stats-kpi-sub">${pomoToday * 25} min focados</div>
        </div>
        <div class="stats-kpi-card">
          <div class="stats-kpi-val" style="color:${weeklyAdherence>=70?'var(--success)':weeklyAdherence>=40?'var(--warning)':'var(--danger)'}">${weeklyAdherence}<span style="font-size:.9rem;opacity:.5">%</span></div>
          <div class="stats-kpi-lbl">Aderência Semanal</div>
          <div class="stats-kpi-sub">últimos 7 dias</div>
        </div>
        <div class="stats-kpi-card">
          <div class="stats-kpi-val">${overallPct}<span style="font-size:.9rem;opacity:.5">%</span></div>
          <div class="stats-kpi-lbl">Taxa Global</div>
          <div class="stats-kpi-sub">${totalDone}/${totalTasks} tarefas</div>
        </div>
      </div>

      <div class="stats-section-title">📈 Tarefas — 7 dias</div>
      <div class="stats-chart-wrap">
        <svg width="100%" viewBox="0 0 ${cW} ${cH}" style="display:block">
          <defs>
            <linearGradient id="sdGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="var(--accent)"/>
              <stop offset="100%" stop-color="var(--accent-2)"/>
            </linearGradient>
          </defs>
          <line x1="${pad}" y1="${innerH}" x2="${cW-pad}" y2="${innerH}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
          ${bars}
        </svg>
        <div style="display:flex;gap:14px;margin-top:6px;font-size:0.72rem;color:var(--text-faint)">
          <span style="display:flex;align-items:center;gap:5px">
            <span style="width:9px;height:9px;border-radius:2px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:inline-block"></span>Concluídas
          </span>
          <span style="display:flex;align-items:center;gap:5px">
            <span style="width:9px;height:9px;border-radius:2px;background:rgba(255,255,255,0.08);display:inline-block"></span>Total
          </span>
        </div>
      </div>

      <div class="stats-section-title">⏱️ Pomodoro</div>
      <div class="stats-row-item">
        <span style="color:var(--text-dim)">Total acumulado</span>
        <span style="font-weight:700;font-family:var(--font-mono)">${pomoTotal}
          <span style="font-size:0.72rem;color:var(--text-faint)">(${Math.floor(pomoTotal*25/60)}h ${(pomoTotal*25)%60}min)</span>
        </span>
      </div>
    `;

  /* ---- Tab: HÁBITOS ---- */
  } else if (_statsDrawerTab === 'habitos') {
    const habitHTML = state.routine.length
      ? state.routine.map(r => {
          const dots = last7.map(date => {
            const hs = habitState(r, date);
            return `<div class="habit-dot ${hs}" title="${date}: ${hs}"></div>`;
          }).join('');
          const streak = calcHabitStreakFor(r);
          const meta = [r.time, r.local].filter(Boolean).join(' · ');
          return `
            <div class="habit-streak-item">
              <div style="display:flex;flex-direction:column;gap:1px;min-width:0;flex:1">
                <span class="habit-streak-name">${escapeHtml(r.title)}</span>
                ${meta ? `<span style="font-size:0.7rem;color:var(--text-faint)">${escapeHtml(meta)}</span>` : ''}
              </div>
              <div class="habit-dots">${dots}</div>
              <span class="habit-streak-badge ${streak===0?'zero':''}" style="font-size:0.7rem">🔥 ${streak}d</span>
            </div>`;
        }).join('')
      : '<div style="color:var(--text-faint);text-align:center;padding:32px 0;font-size:.88rem">Sem hábitos configurados</div>';

    body.innerHTML = `
      <div class="stats-kpi-grid">
        <div class="stats-kpi-card">
          <div class="stats-kpi-val" style="color:${weeklyAdherence>=70?'var(--success)':weeklyAdherence>=40?'var(--warning)':'var(--danger)'}">${weeklyAdherence}<span style="font-size:.9rem;opacity:.5">%</span></div>
          <div class="stats-kpi-lbl">Aderência 7 dias</div>
        </div>
        <div class="stats-kpi-card">
          <div class="stats-kpi-val" style="color:${anaStreak>0?'var(--success)':'inherit'}">${anaStreak}<span style="font-size:.9rem;opacity:.5">d</span></div>
          <div class="stats-kpi-lbl">Sequência Atual</div>
        </div>
        <div class="stats-kpi-card">
          <div class="stats-kpi-val">${habitsDoneToday}<span style="font-size:.9rem;opacity:.5">/${totalHabits}</span></div>
          <div class="stats-kpi-lbl">Feitos Hoje</div>
        </div>
        <div class="stats-kpi-card">
          <div class="stats-kpi-val" style="color:var(--accent-2)">${calcTotalCheckIns()}</div>
          <div class="stats-kpi-lbl">Check-ins Totais</div>
        </div>
      </div>
      <div class="stats-section-title">🔁 Sequências — últimos 7 dias</div>
      <div class="habit-streak-grid">${habitHTML}</div>
    `;

  /* ---- Tab: METAS ---- */
  } else {
    const goalHTML = state.goals.length
      ? state.goals.map(g => `
          <div class="goal-analytics-item">
            <div class="goal-analytics-header">
              <span style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%">${escapeHtml(g.title)}</span>
              <span style="color:var(--accent-2);font-family:var(--font-mono);flex-shrink:0">${g.progress || 0}%</span>
            </div>
            <div class="goal-analytics-bar-wrap"><div class="goal-analytics-bar" style="width:${g.progress||0}%"></div></div>
            <div style="font-size:0.72rem;color:var(--text-faint)">
              ${escapeHtml(g.category||'geral')}${g.deadline?' • '+new Date(g.deadline+'T00:00:00').toLocaleDateString('pt-BR'):''}
            </div>
          </div>`).join('')
      : '<div style="color:var(--text-faint);text-align:center;padding:32px 0;font-size:.88rem">Nenhuma meta criada</div>';

    const pendingDemands = state.demands.filter(d => !d.done);
    const urgentCount    = pendingDemands.filter(d => d.urgency === 'high').length;

    body.innerHTML = `
      <div class="stats-kpi-grid">
        <div class="stats-kpi-card">
          <div class="stats-kpi-val">${activeGoals}</div>
          <div class="stats-kpi-lbl">Metas Ativas</div>
        </div>
        <div class="stats-kpi-card">
          <div class="stats-kpi-val" style="color:var(--accent-2)">${avgGoalPct}<span style="font-size:.9rem;opacity:.5">%</span></div>
          <div class="stats-kpi-lbl">Progresso Médio</div>
        </div>
        <div class="stats-kpi-card">
          <div class="stats-kpi-val" style="color:${urgentCount>0?'var(--danger)':'inherit'}">${pendingDemands.length}</div>
          <div class="stats-kpi-lbl">Demandas Abertas</div>
          <div class="stats-kpi-sub">${urgentCount} urgente${urgentCount!==1?'s':''}</div>
        </div>
        <div class="stats-kpi-card">
          <div class="stats-kpi-val">${totalDone}</div>
          <div class="stats-kpi-lbl">Tarefas Concluídas</div>
          <div class="stats-kpi-sub">de ${totalTasks} totais</div>
        </div>
      </div>
      <div class="stats-section-title">🎯 Progresso das Metas</div>
      <div class="goal-analytics-list">${goalHTML}</div>
    `;
  }
}

/* =========================================================
   FLOATING BAÚ / DESPENSA DRAWER
   ========================================================= */
let _bauDrawerTab = 'despensa';

function openBauDrawer(tab) {
  if (tab) _bauDrawerTab = tab;
  document.getElementById('bauOverlay').classList.add('open');
  document.getElementById('bauDrawer').classList.add('open');
  renderBauDrawer();
}

function closeBauDrawer() {
  document.getElementById('bauOverlay').classList.remove('open');
  document.getElementById('bauDrawer').classList.remove('open');
}

function renderBauDrawer(tab) {
  if (tab) _bauDrawerTab = tab;
  $$('.bau-drawer-itab').forEach(b => b.classList.toggle('active', b.dataset.bptab === _bauDrawerTab));
  const body = $('#bauDrawerBody');
  if (!body) return;
  const now   = new Date();
  const today = now.toISOString().slice(0,10);

  if (_bauDrawerTab === 'despensa') {
    const pending   = state.tasks.filter(t => !t.done);
    const dayOfWeek = now.getDay();
    const weekStart = new Date(now); weekStart.setDate(now.getDate() - dayOfWeek);
    const weekKey   = weekStart.toISOString().slice(0,10);
    const monthKey  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
    const sorted    = [...pending].sort((a,b) => (a.date||'').localeCompare(b.date||'') || (a.time||'').localeCompare(b.time||''));

    const grpToday  = sorted.filter(t => t.date === today);
    const grpWeek   = sorted.filter(t => t.date && t.date >= weekKey && t.date < today);
    const grpMonth  = sorted.filter(t => t.date && t.date >= monthKey && t.date < weekKey);
    const grpOld    = sorted.filter(t => t.date && t.date < monthKey);
    const grpNoDate = sorted.filter(t => !t.date);

    const itemHtml = t => `
      <div class="item prio-${t.priority||'med'}">
        <div class="item-checkbox" data-bdone="${t.id}"></div>
        <div class="item-body">
          <div class="item-title">${escapeHtml(t.title)}</div>
          <div class="item-meta">
            ${t.date ? `<span>${new Date(t.date+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'})}</span>` : ''}
            ${t.time ? `<span>⏰ ${t.time}</span>` : ''}
            <span class="badge ${t.priority||'med'}">${({high:'Alta',med:'Média',low:'Baixa'})[t.priority||'med']}</span>
          </div>
        </div>
        <button class="icon-btn danger" data-bdel="${t.id}">🗑️</button>
      </div>`;

    const grpHtml = (label, cls, items) => !items.length ? '' : `
      <div class="pantry-group">
        <div class="pantry-group-hdr ${cls}"><span>${label}</span><span class="pantry-count">${items.length}</span></div>
        ${items.map(itemHtml).join('')}
      </div>`;

    if (!sorted.length) {
      body.innerHTML = `<div class="pantry-empty"><div style="font-size:2.5rem;margin-bottom:10px">🎉</div><h3>Tudo em dia!</h3><p>Nenhuma tarefa pendente.</p></div>`;
    } else {
      body.innerHTML =
        grpHtml('📅 Hoje',         'today',   grpToday)  +
        grpHtml('📆 Esta semana',  'overdue', grpWeek)   +
        grpHtml('🗓️ Este mês',     'overdue', grpMonth)  +
        grpHtml('⚠️ Mais antigas', 'overdue', grpOld)    +
        grpHtml('📌 Sem data',     'nodate',  grpNoDate);

      $$('[data-bdone]', body).forEach(el => el.onclick = () => {
        const t = state.tasks.find(x => x.id === el.dataset.bdone);
        if (!t) return;
        t.done = true; addToVault('task', t); saveState(); renderBauDrawer(); toast('Tarefa concluída ✓');
      });
      $$('[data-bdel]', body).forEach(el => el.onclick = () => {
        if (!confirmDialog('Excluir tarefa?')) return;
        state.tasks = state.tasks.filter(x => x.id !== el.dataset.bdel);
        saveState(); renderBauDrawer(); toast('Tarefa excluída');
      });
    }

  } else {
    const vault     = state.vault || [];
    const fmtDate   = iso => new Date(iso).toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'});
    const typeIcon  = { task:'✓', goal:'🎯', minigoal:'⭐' };
    const typeLabel = { task:'Tarefa', goal:'Meta', minigoal:'Mini Meta' };

    body.innerHTML = `
      <div style="margin-bottom:8px;font-size:0.85rem;color:var(--text-dim)">${vault.length} item${vault.length!==1?'s':''} no baú.</div>
      <div class="bau-search-bar">
        <div class="bau-search-wrap"><span class="bau-search-icon">🔍</span><input class="bau-search-input" id="bdQ" placeholder="Buscar..." /></div>
        <select class="bau-filter-select" id="bdType">
          <option value="all">Todos</option>
          <option value="task">Tarefas</option>
          <option value="goal">Metas</option>
          <option value="minigoal">Mini Metas</option>
        </select>
      </div>
      <div id="bdList"></div>`;

    const redrawVault = () => {
      const q  = ($('#bdQ')||{}).value || '';
      const ft = ($('#bdType')||{}).value || 'all';
      let items = [...vault];
      if (q)  items = items.filter(v => v.title.toLowerCase().includes(q.toLowerCase()));
      if (ft !== 'all') items = items.filter(v => v.type === ft);
      items.sort((a,b) => new Date(b.completedAt) - new Date(a.completedAt));
      const list = $('#bdList');
      if (!list) return;
      if (!items.length) {
        list.innerHTML = `<div class="pantry-empty"><div style="font-size:2.5rem;margin-bottom:10px">✨</div><h3>${vault.length?'Nenhum encontrado.':'Baú vazio.'}</h3></div>`;
        return;
      }
      list.innerHTML = items.map(v => `
        <div class="bau-item">
          <div class="bau-item-icon">${typeIcon[v.type]||'✓'}</div>
          <div class="bau-item-body">
            <div class="bau-item-title">${escapeHtml(v.title)}</div>
            <div class="bau-item-meta">${typeLabel[v.type]||'Item'} · ${fmtDate(v.completedAt)}</div>
          </div>
          <button class="icon-btn danger" data-bvdel="${v.id}">🗑️</button>
        </div>`).join('');
      $$('[data-bvdel]', list).forEach(el => el.onclick = () => {
        if (!confirmDialog('Remover do Baú?')) return;
        state.vault = state.vault.filter(v => v.id !== el.dataset.bvdel);
        saveState(); renderBauDrawer();
      });
    };

    $('#bdQ').oninput = redrawVault;
    $('#bdType').onchange = redrawVault;
    redrawVault();
  }
}

/* =========================================================
   AGENDA — Google Calendar Style
   ========================================================= */
const AG_COLORS = ['tomato','flamingo','tangerine','banana','sage','basil','peacock','blueberry','lavender','grape','graphite'];
const AG_COLOR_LABELS = {
  tomato:'Tomate', flamingo:'Flamingo', tangerine:'Tangerina', banana:'Banana',
  sage:'Sálvia', basil:'Manjericão', peacock:'Pavão', blueberry:'Mirtilo',
  lavender:'Lavanda', grape:'Uva', graphite:'Grafite'
};
let agView = 'month';
let agDate = new Date();

function agToday() { return new Date().toISOString().slice(0,10); }
function agFmt(d) { return d instanceof Date ? d.toISOString().slice(0,10) : d; }
function agParseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }
function agWeekStart(d) { const dt = new Date(d); dt.setDate(dt.getDate() - dt.getDay()); return dt; }
function agAddDays(d, n) { const dt = new Date(d); dt.setDate(dt.getDate()+n); return dt; }
function agEventsOn(date) {
  const ds = agFmt(date);
  return (state.agenda||[]).filter(ev => {
    if (ev.allDay && ev.endDate) return ds >= ev.date && ds <= ev.endDate;
    return ev.date === ds;
  });
}
function agTimeToMin(t) {
  if (!t) return 0;
  const [h,m] = t.split(':').map(Number);
  return h*60 + m;
}
function agNowFraction() {
  const n = new Date();
  return (n.getHours()*60 + n.getMinutes()) / (24*60);
}

/* ---- Month view ---- */
function renderAgMonth(container) {
  const y = agDate.getFullYear(), m = agDate.getMonth();
  const first = new Date(y, m, 1);
  const startDay = first.getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const prevDays = new Date(y, m, 0).getDate();
  const todayStr = agToday();

  let html = '<div class="ag-month-dow-row">';
  ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d => {
    html += `<div class="ag-month-dow">${d}</div>`;
  });
  html += '</div><div class="ag-month-body">';

  let day = 1 - startDay;
  for (let row = 0; row < 6; row++) {
    html += '<div class="ag-month-row">';
    for (let col = 0; col < 7; col++, day++) {
      let cellDate, otherMonth = false;
      if (day < 1) { cellDate = new Date(y, m-1, prevDays + day); otherMonth = true; }
      else if (day > daysInMonth) { cellDate = new Date(y, m+1, day - daysInMonth); otherMonth = true; }
      else { cellDate = new Date(y, m, day); }
      const ds = agFmt(cellDate);
      const isToday = ds === todayStr;
      const evs = agEventsOn(ds);
      const maxShow = 3;

      html += `<div class="ag-month-cell${otherMonth?' other-month':''}${isToday?' today':''}" data-ag-date="${ds}">`;
      html += `<div class="ag-day-num">${cellDate.getDate()}</div>`;
      evs.slice(0, maxShow).forEach(ev => {
        html += `<div class="ag-chip ag-color-${ev.color||'peacock'}" data-ag-ev="${ev.id}" title="${escapeHtml(ev.title)}">${ev.startTime?ev.startTime+' ':''}${escapeHtml(ev.title)}</div>`;
      });
      if (evs.length > maxShow) {
        html += `<div class="ag-more-chip" data-ag-date="${ds}">+${evs.length - maxShow} mais</div>`;
      }
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  container.innerHTML = html;
  container.querySelectorAll('.ag-month-cell').forEach(cell => {
    cell.addEventListener('click', e => {
      if (e.target.closest('.ag-chip')) { agEditEvent(e.target.closest('.ag-chip').dataset.agEv); return; }
      agNewEvent(cell.dataset.agDate);
    });
  });
}

/* ---- Week view ---- */
function renderAgWeek(container) {
  const ws = agWeekStart(agDate);
  const todayStr = agToday();
  const HOUR_H = 48;

  // Header
  let head = '<div class="ag-week-head"><div></div>';
  for (let d = 0; d < 7; d++) {
    const dt = agAddDays(ws, d); const ds = agFmt(dt);
    const isToday = ds === todayStr;
    head += `<div class="ag-week-head-day">
      <div class="ag-week-head-dow">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][dt.getDay()]}</div>
      <div class="ag-week-head-num${isToday?' today':''}" data-ag-date="${ds}">${dt.getDate()}</div>
    </div>`;
  }
  head += '</div>';

  // All-day strip
  let allday = '<div class="ag-allday-row"><div class="ag-allday-label">dia int.</div>';
  for (let d = 0; d < 7; d++) {
    const ds = agFmt(agAddDays(ws, d));
    const evs = agEventsOn(ds).filter(e => e.allDay);
    allday += `<div class="ag-allday-col" data-ag-date="${ds}">` +
      evs.map(ev => `<div class="ag-chip ag-color-${ev.color||'peacock'}" data-ag-ev="${ev.id}">${escapeHtml(ev.title)}</div>`).join('') +
    '</div>';
  }
  allday += '</div>';

  // Scrollable time grid
  let timeCol = '<div class="ag-time-col">';
  for (let h = 0; h < 24; h++) {
    timeCol += `<div class="ag-time-label">${h===0?'':String(h).padStart(2,'0')+':00'}</div>`;
  }
  timeCol += '</div>';

  let daysCols = '';
  for (let d = 0; d < 7; d++) {
    const dt = agAddDays(ws, d); const ds = agFmt(dt);
    const isToday = ds === todayStr;
    const timedEvs = agEventsOn(ds).filter(e => !e.allDay && e.startTime);

    daysCols += `<div class="ag-week-day-col" data-ag-date="${ds}">`;
    for (let h = 0; h < 24; h++) {
      daysCols += `<div class="ag-hour-cell" data-ag-date="${ds}" data-ag-hour="${h}"></div>`;
    }
    if (isToday) {
      const frac = agNowFraction();
      const topPx = Math.round(frac * 24 * HOUR_H);
      daysCols += `<div class="ag-now-line" style="top:${topPx}px"><div class="ag-now-dot"></div></div>`;
    }
    timedEvs.forEach(ev => {
      const startMin = agTimeToMin(ev.startTime);
      const endMin   = ev.endTime ? agTimeToMin(ev.endTime) : startMin + 60;
      const topPx    = Math.round(startMin * HOUR_H / 60);
      const heightPx = Math.max(20, Math.round((endMin - startMin) * HOUR_H / 60));
      daysCols += `<div class="ag-timed-event ag-color-${ev.color||'peacock'}" data-ag-ev="${ev.id}"
        style="top:${topPx}px;height:${heightPx}px" title="${escapeHtml(ev.title)}">
        ${escapeHtml(ev.title)}</div>`;
    });
    daysCols += '</div>';
  }

  const bodyGrid = `<div class="ag-week-body">${timeCol}${daysCols}</div>`;
  const scrollWrap = `<div class="ag-week-scroll">${bodyGrid}</div>`;

  container.innerHTML = head + allday + `<div class="ag-week" style="display:flex;flex-direction:column;flex:1;overflow:hidden">${scrollWrap}</div>`;

  // Scroll to 7am
  const scroll = container.querySelector('.ag-week-scroll');
  if (scroll) scroll.scrollTop = 7 * HOUR_H;

  container.querySelectorAll('.ag-hour-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const h = cell.dataset.agHour;
      agNewEvent(cell.dataset.agDate, String(h).padStart(2,'0') + ':00');
    });
  });
  container.querySelectorAll('.ag-timed-event, .ag-chip[data-ag-ev]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); agEditEvent(el.dataset.agEv); });
  });
  container.querySelectorAll('.ag-week-head-num').forEach(el => {
    el.addEventListener('click', () => { agDate = agParseDate(el.dataset.agDate); agView = 'day'; renderAgenda(); });
  });
}

/* ---- Day view ---- */
function renderAgDay(container) {
  const ds = agFmt(agDate);
  const todayStr = agToday();
  const HOUR_H = 48;
  const isToday = ds === todayStr;
  const evs = agEventsOn(ds);
  const timedEvs = evs.filter(e => !e.allDay && e.startTime);
  const alldayEvs = evs.filter(e => e.allDay);

  const dow = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'][agDate.getDay()];

  let html = `<div class="ag-day-head">
    <div><div class="ag-day-title">${dow}</div><div class="ag-day-subtitle">${agDate.getDate()} de ${MONTHS[agDate.getMonth()]} de ${agDate.getFullYear()}</div></div>
  </div>`;

  if (alldayEvs.length) {
    html += '<div style="display:flex;gap:4px;flex-wrap:wrap;padding:6px 0 4px 52px;border-bottom:1px solid var(--border)">' +
      alldayEvs.map(ev => `<div class="ag-chip ag-color-${ev.color||'peacock'}" data-ag-ev="${ev.id}">${escapeHtml(ev.title)}</div>`).join('') +
    '</div>';
  }

  let timeCol = '<div class="ag-time-col">';
  for (let h = 0; h < 24; h++) {
    timeCol += `<div class="ag-time-label">${h===0?'':String(h).padStart(2,'0')+':00'}</div>`;
  }
  timeCol += '</div>';

  let dayCol = '<div style="position:relative;border-left:1px solid var(--border)">';
  for (let h = 0; h < 24; h++) {
    dayCol += `<div class="ag-hour-cell" data-ag-date="${ds}" data-ag-hour="${h}"></div>`;
  }
  if (isToday) {
    const frac = agNowFraction();
    const topPx = Math.round(frac * 24 * HOUR_H);
    dayCol += `<div class="ag-now-line" style="top:${topPx}px"><div class="ag-now-dot"></div></div>`;
  }
  timedEvs.forEach(ev => {
    const startMin = agTimeToMin(ev.startTime);
    const endMin   = ev.endTime ? agTimeToMin(ev.endTime) : startMin + 60;
    const topPx    = Math.round(startMin * HOUR_H / 60);
    const heightPx = Math.max(20, Math.round((endMin - startMin) * HOUR_H / 60));
    dayCol += `<div class="ag-timed-event ag-color-${ev.color||'peacock'}" data-ag-ev="${ev.id}"
      style="top:${topPx}px;height:${heightPx}px">
      <div>${escapeHtml(ev.title)}</div>
      ${ev.startTime?`<div style="opacity:.75">${ev.startTime}${ev.endTime?' – '+ev.endTime:''}</div>`:''}
    </div>`;
  });
  dayCol += '</div>';

  const bodyGrid = `<div class="ag-day-body">${timeCol}${dayCol}</div>`;
  html += `<div class="ag-day-scroll">${bodyGrid}</div>`;

  container.innerHTML = html;

  const scroll = container.querySelector('.ag-day-scroll');
  if (scroll) scroll.scrollTop = 7 * HOUR_H;

  container.querySelectorAll('.ag-hour-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      agNewEvent(cell.dataset.agDate, String(cell.dataset.agHour).padStart(2,'0') + ':00');
    });
  });
  container.querySelectorAll('.ag-timed-event, .ag-chip[data-ag-ev]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); agEditEvent(el.dataset.agEv); });
  });
}

/* ---- Main render ---- */
function renderAgenda() {
  if (!state.agenda) state.agenda = [];
  const main = document.getElementById('main');

  const y = agDate.getFullYear(), m = agDate.getMonth();
  const ws = agWeekStart(agDate);

  let titleStr = '';
  if (agView === 'month') titleStr = `${MONTHS[m]} ${y}`;
  else if (agView === 'week') {
    const we = agAddDays(ws, 6);
    titleStr = ws.getMonth() === we.getMonth()
      ? `${ws.getDate()} – ${we.getDate()} de ${MONTHS[ws.getMonth()]} ${ws.getFullYear()}`
      : `${ws.getDate()} ${MONTHS[ws.getMonth()].slice(0,3)} – ${we.getDate()} ${MONTHS[we.getMonth()].slice(0,3)} ${we.getFullYear()}`;
  } else {
    titleStr = `${agDate.getDate()} de ${MONTHS[m]} de ${y}`;
  }

  main.innerHTML = `
    <div class="page-header" style="margin-bottom:0">
      <div>
        <h1 class="page-title">Agenda</h1>
      </div>
    </div>
    <div class="ag-page" id="agPage">
      <div class="ag-toolbar">
        <span class="ag-toolbar-title" id="agTitle">${titleStr}</span>
        <button class="ag-today-btn" id="agTodayBtn">Hoje</button>
        <button class="ag-nav-btn" id="agPrevYearBtn" title="Ano anterior" style="font-size:0.8rem;opacity:0.7">«</button>
        <button class="ag-nav-btn" id="agPrevBtn">&#8249;</button>
        <button class="ag-nav-btn" id="agNextBtn">&#8250;</button>
        <button class="ag-nav-btn" id="agNextYearBtn" title="Próximo ano" style="font-size:0.8rem;opacity:0.7">»</button>
        <div class="ag-view-btns">
          <button class="ag-view-btn${agView==='month'?' active':''}" data-agv="month">Mês</button>
          <button class="ag-view-btn${agView==='week'?' active':''}" data-agv="week">Semana</button>
          <button class="ag-view-btn${agView==='day'?' active':''}" data-agv="dia">Dia</button>
        </div>
        <button class="ag-add-btn" id="agAddBtn">+ Evento</button>
      </div>
      <div id="agBody" style="flex:1;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border);border-radius:12px;background:var(--bg-2)"></div>
    </div>`;

  const body = document.getElementById('agBody');
  if (agView === 'month') renderAgMonth(body);
  else if (agView === 'week') renderAgWeek(body);
  else renderAgDay(body);

  // Toolbar events
  document.getElementById('agTodayBtn').onclick    = () => { agDate = new Date(); renderAgenda(); };
  document.getElementById('agPrevYearBtn').onclick = () => { agDate.setFullYear(agDate.getFullYear() - 1); renderAgenda(); };
  document.getElementById('agNextYearBtn').onclick = () => { agDate.setFullYear(agDate.getFullYear() + 1); renderAgenda(); };
  document.getElementById('agPrevBtn').onclick     = () => { agNavigate(-1); };
  document.getElementById('agNextBtn').onclick     = () => { agNavigate(1); };
  document.getElementById('agAddBtn').onclick   = () => agNewEvent(agFmt(agDate));
  document.querySelectorAll('.ag-view-btn').forEach(btn => {
    btn.onclick = () => {
      const v = btn.dataset.agv;
      agView = v === 'dia' ? 'day' : v;
      renderAgenda();
    };
  });
}

function agNavigate(dir) {
  if (agView === 'month') {
    agDate.setMonth(agDate.getMonth() + dir);
  } else if (agView === 'week') {
    agDate.setDate(agDate.getDate() + dir * 7);
  } else {
    agDate.setDate(agDate.getDate() + dir);
  }
  renderAgenda();
}

/* ---- Event modal ---- */
function agNewEvent(dateStr, startTime) {
  const ev = { id: uid(), title: '', date: dateStr, endDate: '', startTime: startTime||'', endTime: '', allDay: !startTime, color: 'peacock', notes: '' };
  agEventModal(ev, true);
}
function agEditEvent(id) {
  const ev = (state.agenda||[]).find(e => e.id === id);
  if (!ev) return;
  agEventModal({...ev}, false);
}

function agEventModal(ev, isNew) {
  const colorOpts = AG_COLORS.map(c =>
    `<label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:3px 0">
       <input type="radio" name="agColor" value="${c}" ${ev.color===c?'checked':''} style="display:none">
       <span style="width:18px;height:18px;border-radius:50%;background:var(--ag-c-${c},#666);display:inline-block;box-shadow:${ev.color===c?'0 0 0 2px var(--accent)':''}" class="ag-color-swatch ag-color-${c}"></span>
       <span style="font-size:0.8rem">${AG_COLOR_LABELS[c]}</span>
     </label>`).join('');

  openModal(`
    <div class="modal-header"><span>${isNew?'Novo Evento':'Editar Evento'}</span><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div style="display:flex;flex-direction:column;gap:12px;margin-top:12px">
      <input id="agEvTitle" class="input" placeholder="Título do evento" value="${escapeHtml(ev.title)}" style="font-size:1.05rem;font-weight:600">
      <label style="display:flex;align-items:center;gap:8px;font-size:0.88rem;color:var(--text-dim);cursor:pointer">
        <input type="checkbox" id="agEvAllDay" ${ev.allDay?'checked':''} style="width:16px;height:16px">
        Evento de dia inteiro
      </label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label class="label">Data início</label><input id="agEvDate" type="date" class="input" value="${ev.date}"></div>
        <div><label class="label">Data fim</label><input id="agEvEndDate" type="date" class="input" value="${ev.endDate||ev.date}"></div>
      </div>
      <div id="agEvTimesRow" style="display:${ev.allDay?'none':'grid'};grid-template-columns:1fr 1fr;gap:10px">
        <div><label class="label">Início</label><input id="agEvStart" type="time" class="input" value="${ev.startTime||''}"></div>
        <div><label class="label">Fim</label><input id="agEvEnd" type="time" class="input" value="${ev.endTime||''}"></div>
      </div>
      <div><label class="label">Notas</label><textarea id="agEvNotes" class="input" rows="2" style="resize:vertical">${escapeHtml(ev.notes||'')}</textarea></div>
      <div>
        <div class="label" style="margin-bottom:6px">Cor</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">${colorOpts}</div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary" style="flex:1" id="agEvSaveBtn">${isNew?'Criar':'Salvar'}</button>
        ${!isNew?`<button class="btn btn-danger" id="agEvDelBtn">Excluir</button>`:''}
      </div>
    </div>`, el => {
      el.querySelector('#agEvAllDay').onchange = function() {
        el.querySelector('#agEvTimesRow').style.display = this.checked ? 'none' : 'grid';
      };
      el.querySelectorAll('input[name="agColor"]').forEach(inp => {
        inp.onchange = function() {
          el.querySelectorAll('.ag-color-swatch').forEach(s => s.style.boxShadow = '');
          this.nextElementSibling.style.boxShadow = '0 0 0 2px var(--accent)';
        };
      });
      el.querySelector('#agEvSaveBtn').onclick = () => {
        const title = el.querySelector('#agEvTitle').value.trim();
        if (!title) { toast('Informe o título'); return; }
        ev.title    = title;
        ev.date     = el.querySelector('#agEvDate').value;
        ev.endDate  = el.querySelector('#agEvEndDate').value;
        ev.allDay   = el.querySelector('#agEvAllDay').checked;
        ev.startTime = ev.allDay ? '' : el.querySelector('#agEvStart').value;
        ev.endTime   = ev.allDay ? '' : el.querySelector('#agEvEnd').value;
        ev.notes    = el.querySelector('#agEvNotes').value;
        ev.color    = (el.querySelector('input[name="agColor"]:checked')||{value:'peacock'}).value;
        if (!state.agenda) state.agenda = [];
        if (isNew) state.agenda.push(ev);
        else { const i = state.agenda.findIndex(e => e.id === ev.id); if (i>=0) state.agenda[i] = ev; }
        saveState(); closeModal(); renderAgenda();
        toast(isNew ? 'Evento criado!' : 'Evento salvo!');
      };
      const delBtn = el.querySelector('#agEvDelBtn');
      if (delBtn) delBtn.onclick = () => {
        if (!confirmDialog('Excluir este evento?')) return;
        state.agenda = (state.agenda||[]).filter(e => e.id !== ev.id);
        saveState(); closeModal(); renderAgenda();
        toast('Evento excluído');
      };
    });
}

    // Search nav (acessível via sidebar e Ctrl+K)
    document.getElementById('searchNavBackdrop').onclick = e => { if (e.target.id === 'searchNavBackdrop') closeSearchNav(); };
    document.getElementById('searchNavInput').oninput   = e => _renderSearchItems(e.target.value);
    document.getElementById('searchNavInput').onkeydown = e => {
      const items = document.querySelectorAll('.search-nav-item');
      if (!items.length) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); _searchActiveIdx = Math.min(_searchActiveIdx + 1, items.length - 1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); _searchActiveIdx = Math.max(_searchActiveIdx - 1, 0); }
      else if (e.key === 'Enter') { (items[_searchActiveIdx] || items[0])?.click(); return; }
      else return;
      items.forEach((el, i) => el.classList.toggle('snav-active', i === _searchActiveIdx));
      items[_searchActiveIdx]?.scrollIntoView({ block: 'nearest' });
    };

    // Gear FAB → configurações
    document.getElementById('gearFab').onclick = () => navigate('settings');

    // Baú drawer
    document.getElementById('bauFab').onclick = openBauDrawer;
    document.getElementById('bauDrawerClose').onclick = closeBauDrawer;
    document.getElementById('bauOverlay').onclick     = closeBauDrawer;
    $$('.bau-drawer-itab').forEach(btn => { btn.onclick = () => renderBauDrawer(btn.dataset.bptab); });

    // ---- Bottom Nav ----
    document.querySelectorAll('.bnav-item[data-bnroute]').forEach(item => {
      item.onclick = () => {
        navigate(item.dataset.bnroute);
        document.querySelectorAll('.bnav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      };
    });
    document.getElementById('bnavMore').onclick = () => toggleSidebar();

    // Marca item ativo da bottom nav ao navegar
    function syncBnav(route) {
      document.querySelectorAll('.bnav-item[data-bnroute]').forEach(i => {
        i.classList.toggle('active', i.dataset.bnroute === route);
      });
    }
    const _origNav = navigate;
    window.navigate = (route) => {
      _origNav(route);
      syncBnav(route);
      const fabGroup = document.querySelector('.fab-group');
      if (fabGroup) fabGroup.style.display = route === 'dashboard' ? 'flex' : 'none';
    };
    syncBnav('dashboard');
    // FABs visíveis apenas no Início (dashboard é a rota inicial)
    const _fabGroup = document.querySelector('.fab-group');
    if (_fabGroup) _fabGroup.style.display = 'flex';

  } catch(e) {
    console.error('Bau drawer init error:', e);
  }
});
</script>
